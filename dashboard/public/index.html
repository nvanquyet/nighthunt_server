<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NightHunt Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0a0f;--surface:#111118;--card:#1a1a26;--border:#2a2a3a;--text:#e8e8f0;--muted:#888898;--cyan:#00d4ff;--green:#00ff88;--red:#ff4444;--yellow:#ffaa00;--purple:#a855f7;--sidebar:220px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(6px)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 0 60px rgba(0,212,255,.15)}
.login-box h1{text-align:center;color:var(--cyan);font-size:1.8rem;margin-bottom:6px;text-shadow:0 0 20px rgba(0,212,255,.5)}
.login-box p{text-align:center;color:var(--muted);margin-bottom:32px;font-size:.9rem}
.form-group{margin-bottom:18px}
.form-group label{display:block;color:var(--muted);font-size:.85rem;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.form-group input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:8px;font-size:1rem;transition:border-color .2s}
.form-group input:focus{outline:none;border-color:var(--cyan)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.9rem;font-weight:600;transition:all .2s;text-decoration:none}
.btn-primary{background:var(--cyan);color:#000;width:100%;justify-content:center;font-size:1rem;padding:14px}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-sm{padding:6px 14px;font-size:.8rem}
.btn-danger{background:rgba(255,68,68,.15);color:var(--red);border:1px solid rgba(255,68,68,.3)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-success{background:rgba(0,255,136,.15);color:var(--green);border:1px solid rgba(0,255,136,.3)}
.btn-success:hover{background:var(--green);color:#000}
.btn-warn{background:rgba(255,170,0,.15);color:var(--yellow);border:1px solid rgba(255,170,0,.3)}
.btn-warn:hover{background:var(--yellow);color:#000}
.btn-info{background:rgba(0,212,255,.15);color:var(--cyan);border:1px solid rgba(0,212,255,.3)}
.btn-info:hover{background:var(--cyan);color:#000}
#login-error{color:var(--red);text-align:center;margin-top:12px;font-size:.9rem;min-height:20px}
#app{display:none;height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100}
.sidebar-brand{padding:24px 20px;border-bottom:1px solid var(--border)}
.sidebar-brand h2{color:var(--cyan);font-size:1.1rem;text-shadow:0 0 10px rgba(0,212,255,.4)}
.sidebar-brand span{color:var(--muted);font-size:.75rem}
.sidebar-nav{flex:1;padding:16px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;transition:all .2s;color:var(--muted);font-size:.9rem;border-left:3px solid transparent}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.nav-item.active{color:var(--cyan);background:rgba(0,212,255,.05);border-left-color:var(--cyan)}
.nav-item .icon{font-size:1.1rem;width:22px;text-align:center}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border)}
.sidebar-footer .admin-name{color:var(--muted);font-size:.8rem;margin-bottom:8px}
.main{margin-left:var(--sidebar);padding:28px 32px;min-height:100vh;overflow-y:auto}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.page-header h1{font-size:1.6rem;font-weight:700;color:var(--text)}
.page-header h1 span{color:var(--cyan)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;position:relative;overflow:hidden;transition:border-color .2s}
.stat-card:hover{border-color:var(--cyan)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--cyan))}
.stat-card .label{color:var(--muted);font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.stat-card .value{font-size:2rem;font-weight:700;color:var(--text);line-height:1}
.stat-card .sub{color:var(--muted);font-size:.8rem;margin-top:6px}
.stat-card.green{--accent:var(--green)}.stat-card.red{--accent:var(--red)}.stat-card.yellow{--accent:var(--yellow)}.stat-card.purple{--accent:var(--purple)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.panel-header h3{font-size:.95rem;font-weight:600;color:var(--text)}
.panel-body{padding:20px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.875rem}
th{text-align:left;color:var(--muted);font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;padding:10px 14px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.2)}
td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600}
.badge-cyan{background:rgba(0,212,255,.15);color:var(--cyan)}
.badge-green{background:rgba(0,255,136,.12);color:var(--green)}
.badge-red{background:rgba(255,68,68,.12);color:var(--red)}
.badge-yellow{background:rgba(255,170,0,.12);color:var(--yellow)}
.badge-purple{background:rgba(168,85,247,.12);color:var(--purple)}
.badge-gray{background:rgba(255,255,255,.08);color:var(--muted)}
.tier-BRONZE{color:#cd7f32}.tier-SILVER{color:#c0c0c0}.tier-GOLD{color:#ffd700}
.tier-PLATINUM{color:#e5e4e2}.tier-DIAMOND{color:#b9f2ff}.tier-MASTER{color:var(--purple)}.tier-CHALLENGER{color:var(--cyan)}
.filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.filter-input,.filter-select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:.875rem;min-width:160px}
.filter-input:focus,.filter-select:focus{outline:none;border-color:var(--cyan)}
.filter-select option{background:var(--surface)}
.pagination{display:flex;align-items:center;gap:8px;justify-content:flex-end;margin-top:16px}
.page-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.85rem;transition:all .2s}
.page-btn:hover,.page-btn.active{background:var(--cyan);color:#000;border-color:var(--cyan)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
.page-info{color:var(--muted);font-size:.85rem}
.log-row td:first-child{font-family:monospace;font-size:.8rem;color:var(--muted)}
.event-LOGIN{color:var(--green)}.event-LOGOUT{color:var(--muted)}.event-REGISTER{color:var(--cyan)}
.event-BAN{color:var(--red)}.event-UNBAN{color:var(--yellow)}.event-PASSWORD_CHANGE{color:var(--purple)}
.event-ROOM_CREATE,.event-ROOM_JOIN,.event-ROOM_LEAVE{color:var(--yellow)}.event-MATCH_END{color:var(--cyan)}
.chart-box{position:relative;height:240px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:500px;position:relative;max-height:85vh;overflow-y:auto}
.modal h3{color:var(--cyan);font-size:1.2rem;margin-bottom:20px}
.modal .close-btn{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer}
.modal .close-btn:hover{color:var(--text)}
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.room-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.room-card .room-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.room-card .room-code{font-family:monospace;font-size:.85rem;color:var(--muted)}
.room-card .player-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.room-card .player-item{display:flex;justify-content:space-between;font-size:.82rem;padding:6px 10px;background:rgba(255,255,255,.04);border-radius:6px}
.alert{padding:12px 18px;border-radius:8px;font-size:.875rem;margin-bottom:16px}
.alert-success{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);color:var(--green)}
.alert-error{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);color:var(--red)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row td{text-align:center;color:var(--muted);padding:40px}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
input[type=range]{-webkit-appearance:none;width:100%;background:var(--border);height:4px;border-radius:4px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--cyan);border-radius:50%;cursor:pointer}
.leader-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
/* Root admin */
.role-root-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,68,68,.15);color:var(--red);border:1px solid rgba(255,68,68,.3);border-radius:20px;padding:3px 10px;font-size:.72rem;font-weight:700}
.root-section{background:rgba(255,68,68,.04);border:1px solid rgba(255,68,68,.2);border-radius:10px;padding:16px;margin-top:20px}
.root-section h4{color:var(--red);font-size:.85rem;margin-bottom:14px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.08em}
.hash-field{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.hash-value{font-family:monospace;font-size:.74rem;color:var(--muted);word-break:break-all;background:var(--bg);padding:7px 10px;border-radius:6px;flex:1;letter-spacing:.03em;border:1px solid var(--border)}
.hash-toggle{background:rgba(255,68,68,.12);color:var(--red);border:1px solid rgba(255,68,68,.25);border-radius:6px;padding:4px 10px;font-size:.75rem;cursor:pointer;white-space:nowrap;transition:all .2s}
.hash-toggle:hover{background:var(--red);color:#fff}
.root-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 16px;font-size:.82rem;margin-bottom:14px}
.root-grid .r-label{color:var(--muted)}.root-grid .r-val{color:var(--text);font-weight:600;word-break:break-all}
.root-ban-row{background:rgba(255,68,68,.05);border:1px solid rgba(255,68,68,.15);border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:.78rem}
.root-ban-row.inactive{opacity:.5}
.leader-row:last-child{border-bottom:none}
.leader-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0}
.rank-1{background:linear-gradient(135deg,#ffd700,#ffa500);color:#000}.rank-2{background:linear-gradient(135deg,#c0c0c0,#888);color:#000}.rank-3{background:linear-gradient(135deg,#cd7f32,#8b4513);color:#fff}.rank-n{background:var(--border);color:var(--muted)}
.leader-info{flex:1}.leader-name{font-weight:600;font-size:.9rem}.leader-tier{font-size:.75rem;color:var(--muted)}.leader-elo{font-weight:700;color:var(--cyan);font-size:.95rem}
.health-bar-wrap{margin-bottom:16px}.health-bar-label{display:flex;justify-content:space-between;margin-bottom:6px;font-size:.85rem}
.health-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.health-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.fill-cyan{background:linear-gradient(90deg,var(--cyan),#0088aa)}.fill-green{background:linear-gradient(90deg,var(--green),#008844)}.fill-yellow{background:linear-gradient(90deg,var(--yellow),#aa6600)}.fill-red{background:linear-gradient(90deg,var(--red),#aa0000)}
@media(max-width:900px){.sidebar{width:60px}.sidebar .nav-label,.sidebar-brand p,.sidebar-footer .admin-name{display:none}.main{margin-left:60px;padding:20px}.grid-2{grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <h1>&#9670; NightHunt</h1>
    <p>Admin Dashboard</p>
    <div class="form-group"><label>Username</label><input type="text" id="login-user" placeholder="admin" autocomplete="username"></div>
    <div class="form-group"><label>Password</label><input type="password" id="login-pass" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" autocomplete="current-password"></div>
    <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<div id="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2>&#9670; NightHunt</h2>
      <span>Admin Dashboard</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" onclick="nav('overview')" id="nav-overview"><span class="icon">&#128202;</span><span class="nav-label">Overview</span></div>
      <div class="nav-item" onclick="nav('users')" id="nav-users"><span class="icon">&#128101;</span><span class="nav-label">Users</span></div>
      <div class="nav-item" onclick="nav('activity')" id="nav-activity"><span class="icon">&#128196;</span><span class="nav-label">Activity Logs</span></div>
      <div class="nav-item" onclick="nav('rooms')" id="nav-rooms"><span class="icon">&#127760;</span><span class="nav-label">Live Rooms</span></div>
      <div class="nav-item" onclick="nav('matches')" id="nav-matches"><span class="icon">&#128296;</span><span class="nav-label">Matches</span></div>
      <div class="nav-item" onclick="nav('bans')" id="nav-bans"><span class="icon">&#128683;</span><span class="nav-label">Ban Management</span></div>
      <div class="nav-item" onclick="nav('system')" id="nav-system"><span class="icon">&#128268;</span><span class="nav-label">System Health</span></div>
      <div class="nav-item" onclick="nav('online')" id="nav-online"><span class="icon">&#128994;</span><span class="nav-label">Online Users</span></div>
      <div class="nav-item" onclick="nav('dssessions')" id="nav-dssessions"><span class="icon">&#127918;</span><span class="nav-label">DS Sessions</span></div>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-name" id="sidebar-admin">admin</div>
      <div id="role-badge" style="margin-bottom:8px"></div>
      <button class="btn btn-sm btn-danger" onclick="doLogout()" style="width:100%;justify-content:center">Logout</button>
    </div>
  </aside>
  <main class="main" id="main-content"></main>
</div>

<div id="modal-bg" class="modal-bg" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let TOKEN = localStorage.getItem('nh_token') || '';
let adminRole = '';
let refreshTimer = null;
let tierChart = null;
const $ = id => document.getElementById(id);

// JWT payload decode (no library needed — just base64url)
function parseJwtPayload(t) {
  try { return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); } catch(e) { return {}; }
}
function updateRoleBadge() {
  const el=$('role-badge'); if(!el) return;
  el.innerHTML = adminRole==='root'
    ? '<span class="role-root-badge">&#128274; ROOT ADMIN</span>'
    : '';
}

// ─── API ──────────────────────────────────────────────────────────────────────
async function api(method, path, data, params) {
  const url = new URL(path, location.origin);
  if (params) Object.entries(params).forEach(([k,v]) => v != null && v !== '' && url.searchParams.set(k, v));
  const r = await fetch(url, {
    method, headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
    body: data ? JSON.stringify(data) : undefined
  });
  if (r.status === 401) { doLogout(); throw new Error('Unauthorized'); }
  if (!r.ok) { const e = await r.json().catch(()=>({error:r.statusText})); throw new Error(e.error||e.message||r.statusText); }
  return r.json();
}

// ─── Formatters ───────────────────────────────────────────────────────────────
const fmt = n => n==null?'':Number(n).toLocaleString();
const fmtDate = s => s ? new Date(s).toLocaleString('vi-VN',{hour12:false}).replace(',','') : '—';
const fmtBytes = b => { if(!b) return '0 B'; const k=1024,u=['B','KB','MB','GB','TB'],i=Math.floor(Math.log(b)/Math.log(k)); return (b/Math.pow(k,i)).toFixed(1)+' '+u[i]; };
const elo2color = e => e>=2000?'#00d4ff':e>=1800?'#a855f7':e>=1600?'#e5e4e2':e>=1400?'#ffd700':e>=1200?'#c0c0c0':'#cd7f32';
function tierBadge(t) {
  if (!t) return '<span class="badge badge-gray">—</span>';
  const c={BRONZE:'badge-yellow',SILVER:'badge-gray',GOLD:'badge-yellow',PLATINUM:'badge-cyan',DIAMOND:'badge-cyan',MASTER:'badge-purple',CHALLENGER:'badge-cyan'};
  return `<span class="badge ${c[t]||'badge-gray'} tier-${t}">${t}</span>`;
}
function statusBadge(s) {
  const m={WAITING:'badge-yellow',IN_GAME:'badge-green',IN_PROGRESS:'badge-green',FINISHED:'badge-gray',CANCELLED:'badge-red'};
  return `<span class="badge ${m[s]||'badge-gray'}">${s||'?'}</span>`;
}
const eventBadge = e => `<span class="event-${e}" style="font-weight:600;font-size:.8rem">${e}</span>`;
function showAlert(msg, type='success') {
  document.querySelectorAll('.flash-alert').forEach(el=>el.remove());
  const a=document.createElement('div');
  a.className=`alert alert-${type} flash-alert`;
  a.textContent=msg;
  a.style.cssText='position:fixed;bottom:24px;right:24px;z-index:2000;min-width:260px;box-shadow:0 4px 20px rgba(0,0,0,.5)';
  document.body.appendChild(a);
  setTimeout(()=>a.remove(),3500);
}

// ─── Auth ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key==='Enter' && $('login-overlay').style.display!=='none') doLogin(); });

async function doLogin() {
  const u=$('login-user').value.trim(), p=$('login-pass').value;
  $('login-error').textContent='';
  try {
    const r=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if (!r.ok) { $('login-error').textContent=d.error||'Login failed'; return; }
    TOKEN=d.token; localStorage.setItem('nh_token',TOKEN);
    const jp=parseJwtPayload(d.token);
    adminRole=jp.role||'admin';
    $('sidebar-admin').textContent=jp.username||u;
    updateRoleBadge();
    $('login-overlay').style.display='none'; $('app').style.display='flex';
    nav('overview');
  } catch(e) { $('login-error').textContent='Connection error'; }
}

function doLogout() {
  TOKEN=''; localStorage.removeItem('nh_token');
  clearInterval(refreshTimer);
  $('app').style.display='none'; $('login-overlay').style.display='flex';
  $('login-pass').value=''; $('login-error').textContent='';
}

(async () => {
  if (!TOKEN) return;
  try {
    const r=await fetch('/auth/verify',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN}});
    if (r.ok) {
      const jp=parseJwtPayload(TOKEN);
      adminRole=jp.role||'admin';
      $('sidebar-admin').textContent=jp.username||'admin';
      updateRoleBadge();
      $('login-overlay').style.display='none'; $('app').style.display='flex'; nav('overview'); }
  } catch {}
})();

// ─── Navigation ───────────────────────────────────────────────────────────────
function nav(page) {
  clearInterval(refreshTimer);
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const ni=$('nav-'+page); if(ni) ni.classList.add('active');
  ({overview:renderOverview,users:renderUsers,activity:renderActivity,rooms:renderRooms,matches:renderMatches,bans:renderBans,system:renderSystem,online:renderOnlineUsers,dssessions:renderDsSessions}[page]||renderOverview)();
}

// ─── DS Sessions ─────────────────────────────────────────────────────────────
async function renderDsSessions() {
  $('main-content').innerHTML=`
  <div class="page-header"><h1><span>&#127918;</span> Dedicated Server Sessions</h1><button class="btn btn-info btn-sm" onclick="renderDsSessions()">&#8635; Refresh</button></div>
  <div class="stats-grid" id="ds-stats"><div class="stat-card"><div class="label">Loading...</div><div class="value"><div class="spinner"></div></div></div></div>
  <div class="panel" style="margin-top:20px"><div class="panel-header"><h3>&#128225; Active Containers</h3><span id="ds-ts" style="font-size:.8rem;color:var(--muted)"></span></div>
  <div class="panel-body" style="padding:0;overflow-x:auto"><table class="table"><thead><tr>
    <th>Server ID</th><th>Container</th><th>Map</th><th>Status</th><th>Players</th><th>Port</th><th>Region</th><th>Image</th><th>Started</th><th>Last Hb</th>
  </tr></thead><tbody id="ds-tbody"></tbody></table></div></div>`;
  try {
    const r = await api('GET','/api/admin/ds/servers');
    const servers = r.data || r;
    const list = Array.isArray(servers) ? servers : [];
    const inGame = list.filter(s=>s.status==='in_game').length;
    const ready  = list.filter(s=>s.status==='ready').length;
    const starting = list.filter(s=>s.status==='starting').length;
    const totalPl = list.reduce((acc,s)=>(acc+(s.currentPlayers||0)),0);
    $('ds-stats').innerHTML=`
      <div class="stat-card" style="--accent:var(--cyan)"><div class="label">Active Containers</div><div class="value">${list.length}</div><div class="sub">${starting} starting</div></div>
      <div class="stat-card green"><div class="label">In-Game</div><div class="value">${inGame}</div><div class="sub">Active matches</div></div>
      <div class="stat-card yellow"><div class="label">Ready</div><div class="value">${ready}</div><div class="sub">Waiting for players</div></div>
      <div class="stat-card purple"><div class="label">Players In DS</div><div class="value">${totalPl}</div><div class="sub">Across all sessions</div></div>`;
    const dsStatusBadge = s => {
      if(s==='in_game') return '<span class="badge badge-cyan">IN GAME</span>';
      if(s==='ready')   return '<span class="badge badge-green">READY</span>';
      if(s==='starting')return '<span class="badge badge-yellow">STARTING</span>';
      return '<span class="badge badge-gray">'+s+'</span>';
    };
    $('ds-tbody').innerHTML = list.length ? list.map(s=>`<tr>
      <td style="font-family:monospace;font-size:.78rem;color:var(--cyan)">${(s.serverId||'').substring(0,8)}…</td>
      <td style="font-family:monospace;font-size:.78rem;color:var(--muted)">${(s.dockerContainerId||'local').substring(0,12)}</td>
      <td><span class="badge badge-gray" style="font-size:.75rem">${s.mapId||'—'}</span></td>
      <td>${dsStatusBadge(s.status)}</td>
      <td><strong>${s.currentPlayers||0}</strong><span style="color:var(--muted)">/${s.maxPlayers||16}</span></td>
      <td style="font-family:monospace">${s.port||'—'}</td>
      <td>${s.region||'—'}</td>
      <td style="font-size:.72rem;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${s.imageTag||''}">${ (s.imageTag||'—').split(':').pop() }</td>
      <td style="font-size:.78rem;color:var(--muted)">${fmtDate(s.startedAt)}</td>
      <td style="font-size:.78rem;color:${s.lastHeartbeatAt?'var(--green)':'var(--red)'}">${s.lastHeartbeatAt?fmtDate(s.lastHeartbeatAt):'No HB'}</td>
    </tr>`).join('') : '<tr><td colspan="10" style="text-align:center;color:var(--muted);padding:40px">No active DS containers</td></tr>';
    const ts=$('ds-ts'); if(ts) ts.textContent='Updated '+new Date().toLocaleTimeString();
  } catch(e) { $('ds-tbody').innerHTML=`<tr><td colspan="10" class="alert alert-error">${e.message}</td></tr>`; }
  refreshTimer = setInterval(renderDsSessions, 10000);
}

function toggleHash(dispId, btnId, hash) {
  const el=$(dispId), btn=$(btnId);
  if (!el) return;
  if (btn.textContent==='Reveal') {
    el.textContent=hash||'(empty)';
    el.style.color='var(--yellow)';
    btn.textContent='Hide';
  } else {
    el.textContent='•'.repeat(60);
    el.style.color='';
    btn.textContent='Reveal';
  }
}

async function saveUser(id) {

// ─── Live Rooms ───────────────────────────────────────────────────────────────
async function renderRooms() {
  $('main-content').innerHTML=`
  <div class="page-header"><h1><span>&#127760;</span> Live Rooms</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span id="room-ts" style="color:var(--muted);font-size:.8rem"></span>
    <span style="color:var(--green);font-size:.78rem">&#9679; Auto-refresh 5s</span>
    <button class="btn btn-info btn-sm" onclick="loadRooms()">&#8635; Refresh</button>
  </div></div>
  <div class="stats-grid" id="room-stats" style="grid-template-columns:repeat(3,1fr)"></div>
  <div id="room-grid" class="room-grid"></div>`;
  loadRooms();
  refreshTimer=setInterval(loadRooms,5000);
}
async function loadRooms() {
  try {
    const d=await api('GET','/api/admin/rooms');
    if (!$('room-stats')) return;
    $('room-stats').innerHTML=`
    <div class="stat-card yellow"><div class="label">Waiting</div><div class="value">${d.waitingCount}</div><div class="sub">Gathering players</div></div>
    <div class="stat-card green"><div class="label">In-Game</div><div class="value">${d.inGameCount}</div><div class="sub">Active matches</div></div>
    <div class="stat-card"><div class="label">Total Active</div><div class="value">${(d.waitingCount||0)+(d.inGameCount||0)}</div></div>`;
    $('room-grid').innerHTML=(d.rooms||[]).map(r=>`
    <div class="room-card">
      <div class="room-header"><div><strong>${r.roomCode}</strong><div class="room-code">by ${r.ownerName}</div></div>${statusBadge(r.status)}</div>
      <div style="display:flex;justify-content:space-between;font-size:.82rem;color:var(--muted);margin-bottom:10px">
        <span>&#127918; ${r.mode||'?'}</span><span>${r.isPublic?'Public':'Private'}</span><span>&#128101; ${r.playerCount||0}</span>
      </div>
      <div class="player-list">${(r.players||[]).map(p=>`
      <div class="player-item"><span>${p.username}</span><span style="display:flex;gap:4px">
        <span class="badge badge-gray" style="font-size:.7rem">${p.team||'?'}</span>
        ${p.isReady?'<span class="badge badge-green" style="font-size:.7rem">READY</span>':''}
      </span></div>`).join('')||'<div style="color:var(--muted);font-size:.8rem;text-align:center">Empty</div>'}
      </div>
    </div>`).join('')||'<div style="color:var(--muted);text-align:center;padding:40px;grid-column:1/-1">No active rooms</div>';
    const ts=$('room-ts'); if(ts) ts.textContent='Updated '+new Date().toLocaleTimeString();
  } catch(e) { if($('room-grid')) $('room-grid').innerHTML=`<div class="alert alert-error">${e.message}</div>`; }
}

// ─── Matches ──────────────────────────────────────────────────────────────────
let mPage=0,mStatus='',mMode='';
async function renderMatches() {
  $('main-content').innerHTML=`
  <div class="page-header"><h1><span>&#128296;</span> Match History</h1></div>
  <div class="filters">
    <select class="filter-select" onchange="mStatus=this.value;mPage=0;loadMatches()">
      <option value="">All Status</option>
      <option value="WAITING">WAITING</option><option value="IN_PROGRESS">IN_PROGRESS</option>
      <option value="FINISHED">FINISHED</option><option value="CANCELLED">CANCELLED</option>
    </select>
    <select class="filter-select" onchange="mMode=this.value;mPage=0;loadMatches()">
      <option value="">All Modes</option>
      <option value="TEAM_DEATHMATCH">TEAM_DEATHMATCH</option>
      <option value="FREE_FOR_ALL">FREE_FOR_ALL</option>
    </select>
  </div>
  <div class="panel"><div class="panel-body" style="padding:0">
  <div class="table-wrap"><table>
  <thead><tr><th>Match ID</th><th>Mode</th><th>Status</th><th>Winner</th><th>Duration</th><th>End Reason</th><th>Players</th><th>Started</th></tr></thead>
  <tbody id="m-tbody"><tr><td colspan="8" class="loading-row"><div class="spinner"></div></td></tr></tbody>
  </table></div></div></div>
  <div class="pagination" id="m-pager"></div>`;
  loadMatches();
}
async function loadMatches() {
  try {
    const d=await api('GET','/api/admin/matches',null,{page:mPage,size:20,status:mStatus||null,mode:mMode||null});
    $('m-tbody').innerHTML=(d.content||[]).map(m=>{
      const dur=m.durationSecs?Math.floor(m.durationSecs/60)+'m '+(m.durationSecs%60)+'s':'—';
      return `<tr>
      <td style="color:var(--muted);font-family:monospace;font-size:.78rem" title="${m.matchId}">${(m.matchId||'').substring(0,10)}…</td>
      <td><span class="badge badge-purple">${m.gameMode||'?'}</span></td>
      <td>${statusBadge(m.status)}</td>
      <td style="color:var(--green)">Team ${m.winnerTeamId!=null?m.winnerTeamId:'?'}</td>
      <td style="color:var(--muted)">${dur}</td>
      <td style="color:var(--muted);font-size:.82rem">${m.endReason||'—'}</td>
      <td><button class="btn btn-info btn-sm" onclick='showMatchPlayers(${JSON.stringify(m.players||[])})'>&#128101; ${(m.players||[]).length}</button></td>
      <td style="font-size:.78rem;color:var(--muted)">${fmtDate(m.startedAt)}</td></tr>`;
    }).join('')||'<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:30px">No matches found</td></tr>';
    renderPager('m-pager',d,p=>{mPage=p;loadMatches();});
  } catch(e) { $('m-tbody').innerHTML=`<tr><td colspan="8" class="loading-row" style="color:var(--red)">${e.message}</td></tr>`; }
}
function showMatchPlayers(players) {
  $('modal-body').innerHTML=`<h3>&#128296; Match Players</h3>
  <div class="table-wrap"><table>
  <thead><tr><th>Name</th><th>Team</th><th>K</th><th>D</th><th>Score</th><th>ELO Change</th></tr></thead>
  <tbody>${players.map(p=>`<tr>
  <td><strong>${p.displayName||p.userId}</strong></td>
  <td><span class="badge badge-gray">T${p.teamId||'?'}</span></td>
  <td style="color:var(--green)">${p.kills||0}</td><td style="color:var(--red)">${p.deaths||0}</td>
  <td style="color:var(--cyan);font-weight:700">${p.score||0}</td>
  <td style="color:${(p.eloChange||0)>=0?'var(--green)':'var(--red)'};font-weight:600">${(p.eloChange||0)>=0?'+':''}${p.eloChange||0}</td>
  </tr>`).join('')||'<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:20px">No players</td></tr>'}
  </tbody></table></div>`;
  showModal();
}

// ─── Bans ─────────────────────────────────────────────────────────────────────
let bPage=0,bType='',bActive='';
async function renderBans() {
  $('main-content').innerHTML=`
  <div class="page-header"><h1><span>&#128683;</span> Ban Management</h1></div>
  <div class="filters">
    <select class="filter-select" onchange="bType=this.value;bPage=0;loadBans()">
      <option value="">All Types</option>
      <option value="USER">USER</option><option value="IP">IP</option><option value="DEVICE">DEVICE</option>
    </select>
    <select class="filter-select" onchange="bActive=this.value;bPage=0;loadBans()">
      <option value="">All Status</option><option value="true">Active Only</option><option value="false">Expired</option>
    </select>
  </div>
  <div class="panel"><div class="panel-body" style="padding:0">
  <div class="table-wrap"><table>
  <thead><tr><th>ID</th><th>User</th><th>Type</th><th>Reason</th><th>Duration</th><th>Banned At</th><th>Expires</th><th>Status</th><th>Action</th></tr></thead>
  <tbody id="b-tbody"><tr><td colspan="9" class="loading-row"><div class="spinner"></div></td></tr></tbody>
  </table></div></div></div>
  <div class="pagination" id="b-pager"></div>`;
  loadBans();
}
async function loadBans() {
  try {
    const d=await api('GET','/api/admin/bans',null,{page:bPage,size:20,type:bType||null,active:bActive||null});
    $('b-tbody').innerHTML=(d.content||[]).map(b=>`
    <tr><td style="color:var(--muted)">#${b.id}</td>
    <td><strong>${b.username||'—'}</strong><div style="font-size:.75rem;color:var(--muted)">#${b.userId||'—'}</div></td>
    <td><span class="badge badge-red">${b.banType}</span></td>
    <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.reason||'—'}</td>
    <td>${b.isPermanent?'<span class="badge badge-red">Permanent</span>':(b.banDurationMinutes||0)+'m'}</td>
    <td style="font-size:.78rem;color:var(--muted)">${fmtDate(b.bannedAt)}</td>
    <td style="font-size:.78rem;color:var(--muted)">${b.isPermanent?'Never':fmtDate(b.expiresAt)}</td>
    <td>${b.isActive?'<span class="badge badge-red">Active</span>':'<span class="badge badge-gray">Expired</span>'}</td>
    <td>${b.isActive?`<button class="btn btn-success btn-sm" onclick="removeBan(${b.id})">Unban</button>`:''}</td></tr>`).join('')
    ||'<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:30px">No bans found</td></tr>';
    renderPager('b-pager',d,p=>{bPage=p;loadBans();});
  } catch(e) { $('b-tbody').innerHTML=`<tr><td colspan="9" class="loading-row" style="color:var(--red)">${e.message}</td></tr>`; }
}
async function removeBan(id) {
  if (!confirm('Remove this ban?')) return;
  try {
    await api('DELETE',`/api/admin/bans/${id}`);
    showAlert('Ban removed'); loadBans();
    const mb=$('modal-bg'); if(mb.style.display!=='none') closeModal();
  } catch(e) { showAlert(e.message,'error'); }
}

// ─── System Health ─────────────────────────────────────────────────────────────
async function renderSystem() {
  $('main-content').innerHTML=`
  <div class="page-header"><h1><span>&#128268;</span> System Health</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span style="color:var(--green);font-size:.78rem">&#9679; Auto-refresh 10s</span>
    <button class="btn btn-info btn-sm" onclick="loadSystem()">&#8635; Refresh</button>
  </div></div>
  <div id="sys-content" style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
    <div class="panel"><div class="panel-body" style="text-align:center;padding:40px"><div class="spinner"></div></div></div>
  </div>`;
  loadSystem();
  refreshTimer=setInterval(loadSystem,10000);
}
async function loadSystem() {
  if (!$('sys-content')) return;
  const [sysRes,backRes]=await Promise.allSettled([api('GET','/api/system/stats'),api('GET','/api/backend/stats')]);
  const s=sysRes.status==='fulfilled'?sysRes.value:null;
  const b=backRes.status==='fulfilled'?backRes.value:null;
  const cpuU=s?parseFloat(s.cpu.usage):0, memU=s?parseFloat(s.memory.usagePct):0;
  const cpuFill=cpuU>80?'fill-red':cpuU>60?'fill-yellow':'fill-cyan';
  const memFill=memU>80?'fill-red':memU>60?'fill-yellow':'fill-green';
  $('sys-content').innerHTML=`
  <div class="panel"><div class="panel-header"><h3>&#128187; Host Machine</h3></div><div class="panel-body">
    ${s?`<p style="color:var(--muted);font-size:.82rem;margin-bottom:16px">${s.cpu.manufacturer} ${s.cpu.brand} &bull; ${s.cpu.physicalCores} cores @ ${s.cpu.speed}GHz</p>`:''}
    <div class="health-bar-wrap">
      <div class="health-bar-label"><span>CPU Usage</span><span style="color:${cpuFill==='fill-red'?'var(--red)':cpuFill==='fill-yellow'?'var(--yellow)':'var(--cyan)'}">${cpuU}%</span></div>
      <div class="health-bar"><div class="health-bar-fill ${cpuFill}" style="width:${cpuU}%"></div></div>
    </div>
    <div class="health-bar-wrap">
      <div class="health-bar-label"><span>Memory</span><span>${s?fmtBytes(s.memory.used):'0'} / ${s?fmtBytes(s.memory.total):'0'} — ${memU}%</span></div>
      <div class="health-bar"><div class="health-bar-fill ${memFill}" style="width:${memU}%"></div></div>
    </div>
    <div style="margin-top:10px;font-size:.85rem"><span style="color:var(--muted)">Processes:</span> ${s?s.processes.all:0} total, ${s?s.processes.running:0} running</div>
  </div></div>
  <div class="panel"><div class="panel-header"><h3>&#128190; Disk Usage</h3></div><div class="panel-body">
    ${s?s.disk.slice(0,4).map(d=>{const u=parseFloat(d.usagePct),f=u>80?'fill-red':u>60?'fill-yellow':'fill-green';return`
    <div class="health-bar-wrap">
      <div class="health-bar-label"><span style="font-size:.8rem">${d.fs}</span><span>${fmtBytes(d.used)} / ${fmtBytes(d.size)} — ${u}%</span></div>
      <div class="health-bar"><div class="health-bar-fill ${f}" style="width:${u}%"></div></div>
    </div>`;}).join(''):'<p style="color:var(--muted)">Unavailable</p>'}
  </div></div>
  <div class="panel" style="grid-column:1/-1"><div class="panel-header"><h3>&#9881; Backend Status</h3></div><div class="panel-body">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;text-align:center">
      <div class="stat-card"><div class="label">Backend</div><div class="value" style="font-size:1.4rem">${b?'<span style="color:var(--green)">&#10003;</span>':'<span style="color:var(--red)">&#10007;</span>'}</div><div class="sub">${b?'Online':'Offline'}</div></div>
      <div class="stat-card green"><div class="label">Active Rooms</div><div class="value">${b&&b.data?b.data.totalActiveRooms||0:0}</div></div>
      <div class="stat-card purple"><div class="label">Online Users</div><div class="value">${b&&b.data?b.data.totalOnlineUsers||0:0}</div></div>
      <div class="stat-card yellow"><div class="label">In-Game</div><div class="value">${b&&b.data?b.data.totalUsersInRooms||0:0}</div></div>
    </div>
  </div></div>`;
}

// ─── Online Users ─────────────────────────────────────────────────────────────
async function renderOnlineUsers() {
  $('main-content').innerHTML=`
  <div class="page-header"><h1><span>&#128994;</span> Online Users</h1><button class="btn btn-info btn-sm" onclick="renderOnlineUsers()">&#8635; Refresh</button></div>
  <div class="stats-grid" id="ol-stats"><div class="stat-card"><div class="label">Loading...</div><div class="value"><div class="spinner"></div></div></div></div>
  <div class="panel"><div class="panel-header"><h3>&#128100; Currently Online</h3></div>
  <div class="panel-body" style="padding:0"><div class="table-wrap"><table>
  <thead><tr><th>ID</th><th>Username</th><th>ELO</th><th>Tier</th><th>Room</th><th>Room Status</th><th>Mode</th><th>Session TTL</th><th>Actions</th></tr></thead>
  <tbody id="ol-tbody"><tr><td colspan="9" class="loading-row"><div class="spinner"></div></td></tr></tbody>
  </table></div></div></div>`;
  try {
    const d=await api('GET','/api/admin/online-users');
    $('ol-stats').innerHTML=`
    <div class="stat-card green"><div class="label">Online Now</div><div class="value">${fmt(d.onlineCount||0)}</div><div class="sub">Active sessions</div></div>`;
    const users=d.users||[];
    if (!users.length) {
      $('ol-tbody').innerHTML='<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:40px">No users currently online</td></tr>';
      return;
    }
    $('ol-tbody').innerHTML=users.map(u=>{
      const ttl=u.sessionTtlSeconds;
      const ttlStr=ttl!=null?(ttl>3600?`${Math.floor(ttl/3600)}h ${Math.floor((ttl%3600)/60)}m`:`${Math.floor(ttl/60)}m ${ttl%60}s`):'—';
      const ttlColor=ttl!=null&&ttl<300?'var(--red)':ttl!=null&&ttl<900?'var(--yellow)':'var(--green)';
      const roomCode=u.roomCode?`<code style="font-size:.8rem;color:var(--cyan)">${u.roomCode}</code>`:'<span style="color:var(--muted)">—</span>';
      const roomStatus=u.roomStatus?`<span class="badge badge-${u.roomStatus==='IN_GAME'?'cyan':'yellow'}">${u.roomStatus}</span>`:'—';
      return `<tr>
        <td style="color:var(--muted)">#${u.id}</td>
        <td><strong>${u.username}</strong></td>
        <td style="color:${elo2color(u.elo)};font-weight:700">${u.elo}</td>
        <td>${tierBadge(u.tier)}</td>
        <td>${roomCode}</td>
        <td>${roomStatus}</td>
        <td style="font-size:.8rem;color:var(--muted)">${u.gameMode||'—'}</td>
        <td style="font-family:monospace;font-size:.8rem;color:${ttlColor}">${ttlStr}</td>
        <td><button class="btn btn-info btn-sm" onclick="viewUser(${u.id})">View</button></td>
      </tr>`;
    }).join('');
  } catch(e) { $('ol-stats').innerHTML=`<div class="alert alert-error">Error: ${e.message}</div>`; }
}

// ─── Shared helpers ───────────────────────────────────────────────────────────
function renderPager(cid,page,onPage) {
  const c=$(cid); if(!c) return;
  const p=page.page,tot=page.totalPages;
  if(tot<=1) { c.innerHTML=''; return; }
  let h=`<span class="page-info">Page ${p+1}/${tot} (${fmt(page.totalElements)})</span>`;
  h+=`<button class="page-btn" ${p===0?'disabled':''} onclick="(${onPage.toString()})(0)">&laquo;</button>`;
  h+=`<button class="page-btn" ${p===0?'disabled':''} onclick="(${onPage.toString()})(${p-1})">&#8249;</button>`;
  for(let i=Math.max(0,p-2);i<=Math.min(tot-1,p+2);i++)
    h+=`<button class="page-btn ${i===p?'active':''}" onclick="(${onPage.toString()})(${i})">${i+1}</button>`;
  h+=`<button class="page-btn" ${p===tot-1?'disabled':''} onclick="(${onPage.toString()})(${p+1})">&#8250;</button>`;
  h+=`<button class="page-btn" ${p===tot-1?'disabled':''} onclick="(${onPage.toString()})(${tot-1})">&raquo;</button>`;
  c.innerHTML=h;
}
function showModal(content) { if(content) $('modal-body').innerHTML=content; $('modal-bg').style.display='flex'; }
function closeModal(e) { if(e&&e.target!==$('modal-bg')) return; $('modal-bg').style.display='none'; }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
</script>
</body>
