<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NightHunt Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#127918;</text></svg>">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- Login Overlay -->
<div id="login-overlay">
  <div class="login-box">
    <h2>&#127899; NightHunt</h2>
    <p class="subtitle">Admin Dashboard &mdash; Restricted Access</p>
    <div class="field-group">
      <label for="loginUser">Username</label>
      <input type="text" id="loginUser" placeholder="admin" autocomplete="username">
    </div>
    <div class="field-group">
      <label for="loginPass">Password</label>
      <input type="password" id="loginPass" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password">
    </div>
    <div id="login-error"></div>
    <button class="btn btn-primary w-full" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- Mobile sidebar toggle -->
<button id="sidebar-toggle" aria-label="Toggle sidebar" onclick="toggleSidebar()">
  <span></span><span></span><span></span>
</button>
<div id="sidebar-overlay"></div>

<!-- App Shell -->
<div id="app">

  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Night<span>Hunt</span></div>
      <span id="role-badge" class="admin">ADMIN</span>
    </div>

    <div class="nav-items">
      <div class="nav-section-label">General</div>
      <div class="nav-item" id="nav-overview"    onclick="nav('overview')">   <span class="icon">&#128202;</span><span class="nav-label">Overview</span></div>
      <div class="nav-item" id="nav-online"      onclick="nav('online')">     <span class="icon">&#128994;</span><span class="nav-label">Online Users</span></div>
      <div class="nav-item" id="nav-users"       onclick="nav('users')">      <span class="icon">&#128101;</span><span class="nav-label">Users</span></div>
      <div class="nav-item" id="nav-activity"    onclick="nav('activity')">   <span class="icon">&#128196;</span><span class="nav-label">Activity Logs</span></div>

      <div class="nav-section-label">Game</div>
      <div class="nav-item" id="nav-rooms"       onclick="nav('rooms')">      <span class="icon">&#128682;</span><span class="nav-label">Live Rooms</span></div>
      <div class="nav-item" id="nav-matches"     onclick="nav('matches')">    <span class="icon">&#128296;</span><span class="nav-label">Matches</span></div>
      <div class="nav-item" id="nav-dssessions"  onclick="nav('dssessions')"> <span class="icon">&#127918;</span><span class="nav-label">DS Sessions</span></div>

      <div class="nav-section-label">Management</div>
      <div class="nav-item" id="nav-bans"        onclick="nav('bans')">       <span class="icon">&#128683;</span><span class="nav-label">Bans</span></div>
      <div class="nav-item" id="nav-config"      onclick="nav('config')">     <span class="icon">&#9881;</span><span class="nav-label">Game Config</span></div>
      <div class="nav-item" id="nav-system"      onclick="nav('system')">     <span class="icon">&#128268;</span><span class="nav-label">System Health</span></div>
      <div class="nav-item" id="nav-dbclean"     onclick="nav('dbclean')">    <span class="icon">&#128465;</span><span class="nav-label">DB Monitor</span></div>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar">A</div>
        <span id="sidebar-username">admin</span>
      </div>
      <button class="btn btn-ghost btn-sm w-full" onclick="doLogout()">&#10140; Sign Out</button>
    </div>
  </nav>

  <div id="main">
    <div id="page-header">
      <div id="page-title">&#128202; Overview</div>
      <div class="header-actions"></div>
    </div>
    <div id="content"></div>
  </div>

</div>

<!-- Modal -->
<div id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal-container" onclick="event.stopPropagation()"></div>
</div>

<!-- Alerts -->
<div id="alert-box"></div>

<!-- Vendor -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- Core -->
<script src="js/app.js"></script>

<!-- Pages -->
<script src="js/pages/overview.js"></script>
<script src="js/pages/users.js"></script>
<script src="js/pages/activity.js"></script>
<script src="js/pages/rooms.js"></script>
<script src="js/pages/matches.js"></script>
<script src="js/pages/bans.js"></script>
<script src="js/pages/system.js"></script>
<script src="js/pages/online.js"></script>
<script src="js/pages/dssessions.js"></script>
<script src="js/pages/config.js"></script>
<script src="js/pages/database.js"></script>

</body>
</html>
