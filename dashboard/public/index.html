<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NightHunt Server Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: #0f3460;
            margin-bottom: 30px;
            text-align: center;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .stat-card h3 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #0f3460;
        }
        .stat-item:last-child {
            border-bottom: none;
        }
        .stat-label {
            color: #aaa;
        }
        .stat-value {
            color: #fff;
            font-weight: bold;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #0f3460;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #0f3460);
            transition: width 0.3s;
        }
        .refresh-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .refresh-btn:hover {
            background: #c73650;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 NightHunt Server Dashboard</h1>
        <button class="refresh-btn" onclick="loadStats()">🔄 Refresh</button>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>💻 CPU</h3>
                <div class="stat-item">
                    <span class="stat-label">Brand:</span>
                    <span class="stat-value" id="cpu-brand">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Cores:</span>
                    <span class="stat-value" id="cpu-cores">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Speed:</span>
                    <span class="stat-value" id="cpu-speed">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Usage:</span>
                    <span class="stat-value" id="cpu-usage">-</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="cpu-progress" style="width: 0%"></div>
                </div>
            </div>

            <div class="stat-card">
                <h3>🧠 Memory</h3>
                <div class="stat-item">
                    <span class="stat-label">Total:</span>
                    <span class="stat-value" id="mem-total">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Used:</span>
                    <span class="stat-value" id="mem-used">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Free:</span>
                    <span class="stat-value" id="mem-free">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Usage:</span>
                    <span class="stat-value" id="mem-usage">-</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="mem-progress" style="width: 0%"></div>
                </div>
            </div>

            <div class="stat-card">
                <h3>⚙️ Processes</h3>
                <div class="stat-item">
                    <span class="stat-label">Total:</span>
                    <span class="stat-value" id="proc-total">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Running:</span>
                    <span class="stat-value" id="proc-running">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Sleeping:</span>
                    <span class="stat-value" id="proc-sleeping">-</span>
                </div>
            </div>

            <div class="stat-card">
                <h3>🎯 Backend Stats</h3>
                <div class="stat-item">
                    <span class="stat-label">Total Servers:</span>
                    <span class="stat-value" id="backend-total-servers">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Active Servers:</span>
                    <span class="stat-value" id="backend-active-servers">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Total Matches:</span>
                    <span class="stat-value" id="backend-total-matches">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Available Capacity:</span>
                    <span class="stat-value" id="backend-capacity">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        async function loadStats() {
            try {
                // System stats
                const sysRes = await fetch('/api/system/stats');
                const sysData = await sysRes.json();

                document.getElementById('cpu-brand').textContent = sysData.cpu.brand || '-';
                document.getElementById('cpu-cores').textContent = `${sysData.cpu.cores} (${sysData.cpu.physicalCores} physical)`;
                document.getElementById('cpu-speed').textContent = `${sysData.cpu.speed} GHz`;
                const cpuUsage = sysData.cpu.usage?.currentload?.toFixed(1) || '0';
                document.getElementById('cpu-usage').textContent = `${cpuUsage}%`;
                document.getElementById('cpu-progress').style.width = `${cpuUsage}%`;

                document.getElementById('mem-total').textContent = formatBytes(sysData.memory.total);
                document.getElementById('mem-used').textContent = formatBytes(sysData.memory.used);
                document.getElementById('mem-free').textContent = formatBytes(sysData.memory.free);
                document.getElementById('mem-usage').textContent = `${sysData.memory.usage}%`;
                document.getElementById('mem-progress').style.width = `${sysData.memory.usage}%`;

                document.getElementById('proc-total').textContent = sysData.processes.all || '-';
                document.getElementById('proc-running').textContent = sysData.processes.running || '-';
                document.getElementById('proc-sleeping').textContent = sysData.processes.sleeping || '-';

                // Backend stats
                try {
                    const backendRes = await fetch('/api/backend/stats');
                    const backendData = await backendRes.json();

                    if (backendData.success && backendData.data) {
                        document.getElementById('backend-total-servers').textContent = backendData.data.totalServers || '0';
                        document.getElementById('backend-active-servers').textContent = backendData.data.activeServers || '0';
                        document.getElementById('backend-total-matches').textContent = backendData.data.totalMatches || '0';
                        document.getElementById('backend-capacity').textContent = backendData.data.availableCapacity || '0';
                    } else {
                        // Fallback if backend not available
                        document.getElementById('backend-total-servers').textContent = '-';
                        document.getElementById('backend-active-servers').textContent = '-';
                        document.getElementById('backend-total-matches').textContent = '-';
                        document.getElementById('backend-capacity').textContent = '-';
                    }
                } catch (error) {
                    console.error('Error loading backend stats:', error);
                    document.getElementById('backend-total-servers').textContent = '-';
                    document.getElementById('backend-active-servers').textContent = '-';
                    document.getElementById('backend-total-matches').textContent = '-';
                    document.getElementById('backend-capacity').textContent = '-';
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Auto refresh every 5 seconds
        loadStats();
        setInterval(loadStats, 5000);
    </script>
</body>
</html>
