# ── resolver ────────────────────────────────────────────────────────────────
# Use Docker's internal DNS resolver so nginx does NOT fail to start when
# backend/dashboard containers aren't up yet (deferred/lazy DNS resolution).
resolver 127.0.0.11 valid=10s ipv6=off;

# ── HTTP  (port 80) ──────────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name vawnwuyest.me www.vawnwuyest.me dashboard.vawnwuyest.me db.vawnwuyest.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS vawnwuyest.me (port 443) ────────────────────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name vawnwuyest.me www.vawnwuyest.me;

    ssl_certificate     /etc/letsencrypt/live/vawnwuyest.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vawnwuyest.me/privkey.pem;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            DENY                                           always;
    add_header X-Content-Type-Options     nosniff                                        always;
    add_header Referrer-Policy            no-referrer                                    always;

    client_max_body_size 20m;

    # WebSocket — wss://vawnwuyest.me/api/ws/game
    location /api/ws/ {
        set $backend "backend:8080";
        proxy_pass          http://$backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade            $http_upgrade;
        proxy_set_header    Connection         "upgrade";
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # No-cache for HTML pages (ensure users always see latest deploy)
    location ~* \.html$ {
        set $backend "backend:8080";
        proxy_pass          http://$backend;
        proxy_http_version  1.1;
        proxy_set_header    Connection         "";
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        add_header          Cache-Control      "no-cache, no-store, must-revalidate" always;
        add_header          Pragma             "no-cache" always;
        expires             0;
    }

    # REST API + all other paths
    location / {
        set $backend "backend:8080";
        proxy_pass          http://$backend;
        proxy_http_version  1.1;
        proxy_set_header    Connection         "";
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
    }
}

# ── HTTPS dashboard.vawnwuyest.me (port 443) ──────────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name dashboard.vawnwuyest.me;

    ssl_certificate     /etc/letsencrypt/live/vawnwuyest.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vawnwuyest.me/privkey.pem;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options            SAMEORIGIN                            always;
    add_header X-Content-Type-Options     nosniff                               always;
    add_header Referrer-Policy            no-referrer                           always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://vawnwuyest.me wss://vawnwuyest.me" always;

    client_max_body_size 5m;

    # No-cache for HTML/JS/CSS so users always see latest deploy
    location ~* \.(html|js|css)$ {
        set $dashboard "dashboard:3000";
        proxy_pass          http://$dashboard;
        proxy_http_version  1.1;
        proxy_set_header    Connection         "";
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_read_timeout  30s;
        add_header          Cache-Control      "no-cache, no-store, must-revalidate" always;
        add_header          Pragma             "no-cache" always;
        expires             0;
    }

    # SSE streams (load test log tailing) — keep alive for up to 2 hours
    location ~ ^/api/loadtest/run/ {
        set $dashboard "dashboard:3000";
        proxy_pass          http://$dashboard;
        proxy_http_version  1.1;
        proxy_set_header    Connection         "";
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_read_timeout  7200s;
        proxy_buffering     off;
        proxy_cache         off;
    }

    location / {
        set $dashboard "dashboard:3000";
        proxy_pass          http://$dashboard;
        proxy_http_version  1.1;
        proxy_set_header    Connection         "";
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_read_timeout  30s;
    }
}

# ── HTTPS db.vawnwuyest.me — phpMyAdmin ───────────────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name db.vawnwuyest.me;

    ssl_certificate     /etc/letsencrypt/live/vawnwuyest.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vawnwuyest.me/privkey.pem;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options     nosniff                               always;
    add_header Referrer-Policy            no-referrer                           always;

    # Restrict access to specific IPs — remove or adjust for your own IP
    # allow YOUR_IP;
    # deny all;

    client_max_body_size 20m;

    location / {
        set $pma "phpmyadmin:80";
        proxy_pass          http://$pma;
        proxy_http_version  1.1;
        proxy_set_header    Connection         "";
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_read_timeout  60s;
    }
}
