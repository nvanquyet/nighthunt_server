# ══════════════════════════════════════════════════════════════
# docker-compose.yml — NightHunt Backend Stack
#
# PRODUCTION (standard):  docker-compose --env-file .env.production up -d
#              (CI/CD pipeline tự chạy — không cần config thủ công)
#
# LOCAL DEV (optional):   docker-compose --env-file .env.local up -d
#              (hoặc dùng: ./dev-start.ps1 — auto setup hoàn toàn)
# ══════════════════════════════════════════════════════════════

services:
  mysql:
    image: mysql:8.0
    container_name: nighthunt-mysql
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 768m
    networks:
      - nighthunt-network
    command: >-
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=512M
      --innodb-log-file-size=64M

  redis:
    image: redis:7-alpine
    container_name: nighthunt-redis
    env_file:
      - ${ENV_FILE:-.env.production}
    # Neu REDIS_PASSWORD trong thi chay khong password
    # Neu co password thi them --requirepass
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-server --requirepass $$REDIS_PASSWORD; else redis-server; fi"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a $$REDIS_PASSWORD ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    mem_limit: 128m
    networks:
      - nighthunt-network

  nats:
    image: nats:2.10-alpine
    container_name: nighthunt-nats
    command: ["-js", "-sd", "/data"]
    expose:
      - "4222"
      - "8222"
    volumes:
      - nats_data:/data
    restart: unless-stopped
    mem_limit: 256m
    networks:
      - nighthunt-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: nighthunt-phpmyadmin
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:8081:80"
    profiles: ["tools"]
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 128m
    networks:
      - nighthunt-network

  backend:
    image: ghcr.io/nvanquyet/nighthunt-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nighthunt-backend
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      # Database Configuration
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      
      # Redis Configuration
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      NATS_SUBJECT_PREFIX: ${NATS_SUBJECT_PREFIX:-rt.gateway}
      JETSTREAM_STREAM_NAME: ${JETSTREAM_STREAM_NAME:-NIGHTHUNT_EVENTS}
      JETSTREAM_SUBJECTS: ${JETSTREAM_SUBJECTS:-events.>}
      
      # JWT & Security
      JWT_SECRET: ${JWT_SECRET}
      CSRF_ENABLED: ${CSRF_ENABLED}
      
      # SSL/HTTPS Configuration
      SERVER_PORT: ${SERVER_PORT}
      SSL_ENABLED: ${SSL_ENABLED}
      SSL_KEYSTORE: ${SSL_KEYSTORE}
      SSL_KEYSTORE_PASSWORD: ${SSL_KEYSTORE_PASSWORD}
      SSL_KEYSTORE_TYPE: ${SSL_KEYSTORE_TYPE}
      SSL_KEY_ALIAS: ${SSL_KEY_ALIAS}
      USE_HTTPS: ${USE_HTTPS}
      API_BASE_URL: ${API_BASE_URL}
      
      # CORS Configuration
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      
      # Dedicated Server Configuration
      VPS_PUBLIC_IP: ${VPS_PUBLIC_IP}
      DS_IMAGE_REF: ${DS_IMAGE_REF}
      ADMIN_SECRET: ${ADMIN_SECRET}
      DS_BACKEND_INTERNAL_URL: ${DS_BACKEND_INTERNAL_URL}
      DS_PORT_START: ${DS_PORT_START}
      DS_PORT_END: ${DS_PORT_END}
      DS_MAX_PLAYERS: ${DS_MAX_PLAYERS}
      GHCR_TOKEN: ${GHCR_TOKEN:-}
      GHCR_OWNER: ${GHCR_OWNER:-}
      # Relay Configuration (custom games across networks)
      RELAY_SERVER_URL: ${RELAY_SERVER_URL:-http://nighthunt-relay:7776}
      RELAY_HOST: ${RELAY_HOST:-}
      RELAY_PORT: ${RELAY_PORT:-7777}
      # [PRODUCTION] Backend runs HTTP internally — nginx handles TLS on 443.
      # Port exposed here for debug access; firewall port 8080 on VPS if desired.
      # Logging
      LOG_PATH: /app/logs
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      # JVM heap cap — prevents OOM on 8 GB VPS running multiple containers
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx896m -XX:+UseG1GC -XX:MaxMetaspaceSize=256m -XX:+ExitOnOutOfMemoryError"
    ports:
      - "127.0.0.1:${SERVER_PORT}:${SERVER_PORT}"
    volumes:
      # SSL Certificates
      - ./src/main/resources/certs:/app/certs:ro
      # Docker socket for spawning DS containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent log files (survives container restarts)
      - backend_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      nighthunt-relay:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "if [ \"$${SSL_ENABLED:-false}\" = 'true' ]; then wget -qO- --no-check-certificate https://localhost:$${SERVER_PORT:-8443}/api/actuator/health; else wget -qO- http://localhost:$${SERVER_PORT:-8080}/api/actuator/health; fi || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 1280m
    networks:
      - nighthunt-network
      - game-network

  realtime-gateway:
    image: ghcr.io/nvanquyet/nighthunt-realtime-gateway:latest
    build:
      context: .
      dockerfile: realtime-gateway/Dockerfile
    container_name: nighthunt-realtime-gateway
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      GATEWAY_ID: ${GATEWAY_ID:-gateway-1}
      GATEWAY_PORT: ${GATEWAY_PORT:-8090}
      GATEWAY_METRICS_PORT: ${GATEWAY_METRICS_PORT:-9091}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URI: ${GATEWAY_REDIS_URI:-}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      NATS_SUBJECT_PREFIX: ${NATS_SUBJECT_PREFIX:-rt.gateway}
      WS_PATH: ${WS_PATH:-/api/ws/game}
      WS_ACCEPT_BACKLOG: ${WS_ACCEPT_BACKLOG:-8192}
      WS_MAX_FRAME_BYTES: ${WS_MAX_FRAME_BYTES:-4096}
      WS_MAX_PENDING_OUTBOUND_BYTES: ${WS_MAX_PENDING_OUTBOUND_BYTES:-262144}
      WS_HEARTBEAT_TIMEOUT_SECONDS: ${WS_HEARTBEAT_TIMEOUT_SECONDS:-45}
      WS_PRESENCE_LEASE_SECONDS: ${WS_PRESENCE_LEASE_SECONDS:-60}
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 512m
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    networks:
      - nighthunt-network

  # ── nginx — SSL termination + reverse proxy ────────────────────────────────
  # Handles HTTPS (443) with Let's Encrypt cert and redirects HTTP (80) → HTTPS.
  # Backend runs plain HTTP internally; nginx is the only TLS endpoint.
  # NOTE: only used in production (.env.production).  Local dev connects directly
  #       to backend:8443 (SSL_ENABLED=true via mkcert).
  nginx:
    image: nginx:1.27-alpine
    container_name: nighthunt-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - letsencrypt_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_started
      realtime-gateway:
        condition: service_started
    restart: unless-stopped
    mem_limit: 64m
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    networks:
      - nighthunt-network

  # ── certbot — automatic Let's Encrypt renewal ──────────────────────────────
  # Runs `certbot renew` every 12 h; nginx picks up renewed cert on next reload.
  # First-time cert issuance: run  scripts/init-letsencrypt.sh  on the VPS.
  certbot:
    image: certbot/certbot:latest
    container_name: nighthunt-certbot
    volumes:
      - letsencrypt_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    mem_limit: 64m
    networks:
      - nighthunt-network

  # ── nighthunt-relay — UDP relay server for custom games ──────────────────────
  # Handles cross-network custom games (different WiFi, mobile, etc.).
  # All players (host + clients) connect outbound to relay → works with any NAT.
  # Exposes UDP ports 7777-7900 to the internet (open these in VPS firewall).
  # Backend communicates with this service on internal port 7776 (HTTP control API).
  nighthunt-relay:
    build:
      context: ./relay
      dockerfile: Dockerfile
    container_name: nighthunt-relay
    ports:
      - "7777-7900:7777-7900/udp"  # UDP game sessions (expose in VPS firewall)
    environment:
      - RELAY_PORT_START=${RELAY_PORT_START:-7777}
      - RELAY_PORT_END=${RELAY_PORT_END:-7900}
    command:
      - "--http-port=7776"
      - "--port-start=${RELAY_PORT_START:-7777}"
      - "--port-end=${RELAY_PORT_END:-7900}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7776/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
    mem_limit: 128m
    networks:
      - nighthunt-network

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: nighthunt-dashboard
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      BACKEND_URL: ${DASHBOARD_BACKEND_URL}
      PORT: ${DASHBOARD_PORT}
      DASHBOARD_ADMIN_USER: ${DASHBOARD_ADMIN_USER}
      DASHBOARD_ADMIN_PASS: ${DASHBOARD_ADMIN_PASS}
      DASHBOARD_ROOT_USER: ${DASHBOARD_ROOT_USER}
      DASHBOARD_ROOT_PASS: ${DASHBOARD_ROOT_PASS}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_SECRET: ${ADMIN_SECRET}
      LOAD_TESTS_HOST_PATH: ${LOAD_TESTS_HOST_PATH:-/opt/nighthunt/load-tests}
    ports:
      - "127.0.0.1:${DASHBOARD_PORT}:${DASHBOARD_PORT}"
    volumes:
      - ./load-tests:/app/load-tests      # rw — JMeter docker runner writes results here
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket for JMeter runner
    depends_on:
      - backend
    restart: unless-stopped
    mem_limit: 256m
    networks:
      - nighthunt-network

volumes:
  mysql_data:
  redis_data:
  nats_data:
  letsencrypt_certs:   # Let's Encrypt certs managed by certbot container
  certbot_www:         # ACME HTTP-01 challenge webroot
  backend_logs:        # Persistent rolling log files (nighthunt.log, nighthunt-error.log)

networks:
  nighthunt-network:
    driver: bridge
  # Network riêng cho DS containers ↔ backend (tách biệt với DB/Redis)
  game-network:
    external: true
    name: nighthunt_game-network   # Tên cố định để DockerManagerService reference
