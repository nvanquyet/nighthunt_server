version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: nighthunt-mysql
    environment:
      MYSQL_DATABASE: nighthunt
      MYSQL_USER: nighthunt
      MYSQL_PASSWORD: nighthunt
      MYSQL_ROOT_PASSWORD: nighthunt
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pnighthunt"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nighthunt-network
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: nighthunt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nighthunt-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: nighthunt-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: nighthunt
      PMA_PASSWORD: nighthunt
      MYSQL_ROOT_PASSWORD: nighthunt
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - nighthunt-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nighthunt-backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/nighthunt
      DB_USERNAME: nighthunt
      DB_PASSWORD: nighthunt
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key-in-production-min-256-bits}
      SERVER_PORT: ${SERVER_PORT:-8080}
      SSL_ENABLED: ${SSL_ENABLED:-false}
      USE_HTTPS: ${USE_HTTPS:-false}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nighthunt-network

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: nighthunt-dashboard
    environment:
      BACKEND_URL: http://backend:8080
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - nighthunt-network
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

volumes:
  mysql_data:
  redis_data:

networks:
  nighthunt-network:
    driver: bridge
