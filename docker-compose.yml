# ══════════════════════════════════════════════════════════════
# docker-compose.yml — NightHunt Backend Stack
#
# LOCAL DEV:   docker-compose --env-file .env.local up -d
#              (hoặc dùng: ./dev-start.ps1 — auto setup hoàn toàn)
#
# PRODUCTION:  docker-compose --env-file .env.production up -d
#              (CI/CD pipeline tự chạy — không cần config thủ công)
# ══════════════════════════════════════════════════════════════

services:
  mysql:
    image: mysql:8.0
    container_name: nighthunt-mysql
    env_file:
      - ${ENV_FILE:-.env.local}
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nighthunt-network
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: nighthunt-redis
    env_file:
      - ${ENV_FILE:-.env.local}
    # Neu REDIS_PASSWORD trong thi chay khong password
    # Neu co password thi them --requirepass
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-server --requirepass $$REDIS_PASSWORD; else redis-server; fi"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a $$REDIS_PASSWORD ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - nighthunt-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: nighthunt-phpmyadmin
    env_file:
      - ${ENV_FILE:-.env.local}
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nighthunt-network

  backend:
    image: ghcr.io/nvanquyet/nighthunt-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nighthunt-backend
    env_file:
      - ${ENV_FILE:-.env.local}
    environment:
      # Database Configuration
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      
      # Redis Configuration
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      
      # JWT & Security
      JWT_SECRET: ${JWT_SECRET}
      CSRF_ENABLED: ${CSRF_ENABLED}
      
      # SSL/HTTPS Configuration
      SERVER_PORT: ${SERVER_PORT}
      SSL_ENABLED: ${SSL_ENABLED}
      SSL_KEYSTORE: ${SSL_KEYSTORE}
      SSL_KEYSTORE_PASSWORD: ${SSL_KEYSTORE_PASSWORD}
      SSL_KEYSTORE_TYPE: ${SSL_KEYSTORE_TYPE}
      SSL_KEY_ALIAS: ${SSL_KEY_ALIAS}
      USE_HTTPS: ${USE_HTTPS}
      API_BASE_URL: ${API_BASE_URL}
      
      # CORS Configuration
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      
      # Dedicated Server Configuration
      VPS_PUBLIC_IP: ${VPS_PUBLIC_IP}
      DS_IMAGE_REF: ${DS_IMAGE_REF}
      DS_ADMIN_SECRET: ${DS_ADMIN_SECRET}
      DS_BACKEND_INTERNAL_URL: ${DS_BACKEND_INTERNAL_URL}
      DS_PORT_START: ${DS_PORT_START}
      DS_PORT_END: ${DS_PORT_END}
      DS_MAX_PLAYERS: ${DS_MAX_PLAYERS}
      GHCR_TOKEN: ${GHCR_TOKEN:-}
      GHCR_OWNER: ${GHCR_OWNER:-}
      # [PRODUCTION] Backend runs HTTP internally — nginx handles TLS on 443.
      # Port exposed here for debug access; firewall port 8080 on VPS if desired.
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    volumes:
      # SSL Certificates
      - ./src/main/resources/certs:/app/certs:ro
      # Docker socket for spawning DS containers
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "if [ \"$${SSL_ENABLED:-false}\" = 'true' ]; then wget -qO- --no-check-certificate https://localhost:$${SERVER_PORT:-8443}/api/actuator/health; else wget -qO- http://localhost:$${SERVER_PORT:-8080}/api/actuator/health; fi || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nighthunt-network
      - game-network

  # ── nginx — SSL termination + reverse proxy ────────────────────────────────
  # Handles HTTPS (443) with Let's Encrypt cert and redirects HTTP (80) → HTTPS.
  # Backend runs plain HTTP internally; nginx is the only TLS endpoint.
  # NOTE: only used in production (.env.production).  Local dev connects directly
  #       to backend:8443 (SSL_ENABLED=true via mkcert).
  nginx:
    image: nginx:1.27-alpine
    container_name: nighthunt-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - letsencrypt_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - nighthunt-network

  # ── certbot — automatic Let's Encrypt renewal ──────────────────────────────
  # Runs `certbot renew` every 12 h; nginx picks up renewed cert on next reload.
  # First-time cert issuance: run  scripts/init-letsencrypt.sh  on the VPS.
  certbot:
    image: certbot/certbot:latest
    container_name: nighthunt-certbot
    volumes:
      - letsencrypt_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - nighthunt-network

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: nighthunt-dashboard
    env_file:
      - ${ENV_FILE:-.env.local}
    environment:
      BACKEND_URL: ${DASHBOARD_BACKEND_URL}
      PORT: ${DASHBOARD_PORT}
      DASHBOARD_ADMIN_USER: ${DASHBOARD_ADMIN_USER}
      DASHBOARD_ADMIN_PASS: ${DASHBOARD_ADMIN_PASS}
      DASHBOARD_ROOT_USER: ${DASHBOARD_ROOT_USER}
      DASHBOARD_ROOT_PASS: ${DASHBOARD_ROOT_PASS}
      JWT_SECRET: ${JWT_SECRET}
      DS_ADMIN_SECRET: ${DS_ADMIN_SECRET}
    ports:
      - "${DASHBOARD_PORT}:${DASHBOARD_PORT}"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - nighthunt-network

volumes:
  mysql_data:
  redis_data:
  letsencrypt_certs:   # Let's Encrypt certs managed by certbot container
  certbot_www:         # ACME HTTP-01 challenge webroot

networks:
  nighthunt-network:
    driver: bridge
  # Network riêng cho DS containers ↔ backend (tách biệt với DB/Redis)
  game-network:
    driver: bridge
    name: nighthunt_game-network   # Tên cố định để DockerManagerService reference
