spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: test-secret-key-that-is-at-least-32-chars-long-for-hmac-sha256
  expiration: 3600000

elo:
  tier:
    silver: 1200
    gold: 1400
    platinum: 1600
    diamond: 1800
    master: 2000
  k:
    new: 40
    normal: 25
    high: 16
