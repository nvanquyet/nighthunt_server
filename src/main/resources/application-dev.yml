# Development profile - local testing with HTTPS
server:
  port: 8443
  ssl:
    enabled: true
    key-store: classpath:certs/keystore.p12
    key-store-password: nighthunt-dev
    key-store-type: PKCS12
    key-alias: nighthunt

api:
  base-url: https://localhost:8443
  use-https: true

# bắt buộćc để debug DS endpoints local
ds:
  vps:
    public-ip: 127.0.0.1
  docker:
    enabled: false   # Không chạy docker run trên local - simulate bằng curl
  admin:
    secret: local-admin-secret

logging:
  level:
    com.nighthunt: DEBUG
