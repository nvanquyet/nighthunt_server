spring:
  application:
    name: nighthunt-backend
  main:
    allow-circular-references: true
  
  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/nighthunt}
    username: ${DB_USERNAME:nighthunt}
    password: ${DB_PASSWORD:nighthunt}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate  # Changed from 'update' to 'validate' - Flyway handles migrations
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  
  # Flyway configuration for database migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true  # Auto-baseline existing database
    baseline-version: 0  # Start from version 0
    validate-on-migrate: true
    clean-disabled: true  # Disable clean in production
  
  data:
    redis:
      repositories:
        enabled: false   # Không dùng @RedisHash repos, chỉ dùng RedisTemplate
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-min-256-bits}
  expiration: ${JWT_EXPIRATION:900000} # 15 minutes in milliseconds (was 3600000 = 1h)

# Auth configuration
auth:
  refresh-token:
    expiry-days: ${REFRESH_TOKEN_EXPIRY_DAYS:30} # Days before refresh token expires

server:
  port: ${SERVER_PORT:8443}
  servlet:
    context-path: /api  # All REST APIs now under /api prefix
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEYSTORE:}
    key-store-password: ${SSL_KEYSTORE_PASSWORD:}
    key-store-type: ${SSL_KEYSTORE_TYPE:PKCS12}
    key-alias: ${SSL_KEY_ALIAS:}
  error:
    include-message: always
    include-stacktrace: on_param

# API Base URL Configuration
api:
  base-url: ${API_BASE_URL:https://localhost:8443}
  use-https: ${USE_HTTPS:true}

# CORS Configuration — set CORS_ALLOWED_ORIGINS env var in production
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://localhost:3000,https://localhost:8443}
  security:
    # CSRF Protection: disable for testing/development, enable for production
    csrf-enabled: ${CSRF_ENABLED:false}

logging:
  level:
    root: INFO
    com.nighthunt: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# ── Dedicated Server Configuration ───────────────────────────────────────────
ds:
  vps:
    public-ip: ${VPS_PUBLIC_IP:127.0.0.1}

  port:
    start: ${DS_PORT_START:7777}
    end:   ${DS_PORT_END:7900}

  max-players: ${DS_MAX_PLAYERS:16}

  docker:
    # Docker image full ref (cập nhật bởi CI/CD qua /api/admin/ds/update-image)
    image-ref:           ${DS_IMAGE_REF:ghcr.io/yourname/nighthunt-ds:latest}
    # URL backend mà DS dùng để gọi về (internal Docker network URL)
    backend-internal-url: ${DS_BACKEND_INTERNAL_URL:https://nighthunt-backend:8443}
    max-memory-mb:       ${DS_MAX_MEMORY_MB:512}
    # false = skip docker run (dùng khi test local, không có DS image)
    enabled:             ${DS_DOCKER_ENABLED:true}

  admin:
    # Secret dùng cho CI/CD webhook (POST /api/admin/ds/update-image)
    secret: ${DS_ADMIN_SECRET:change-me-in-production}
