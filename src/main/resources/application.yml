spring:
  application:
    name: nighthunt-backend

  web:
    resources:
      cache:
        cachecontrol:
          no-store: true   # Prevent browser caching of dashboard.html and other static files
  
  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/nighthunt}
    username: ${DB_USERNAME:nighthunt}
    password: ${DB_PASSWORD:nighthunt}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50       # Default 10 is too low for 500-VU stress test
      minimum-idle: 10
      connection-timeout: 30000   # 30s wait for connection from pool
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate  # Changed from 'update' to 'validate' - Flyway handles migrations
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  
  # Flyway configuration for database migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true  # Auto-baseline existing database
    baseline-version: 0  # Start from version 0
    validate-on-migrate: true
    clean-disabled: true  # Disable clean in production
  
  data:
    redis:
      repositories:
        enabled: false   # Khng dng @RedisHash repos, ch dng RedisTemplate
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          enabled: true
          max-active: 100     # Default 8  bottleneck with concurrent auth/session checks
          max-idle: 50
          min-idle: 20
          max-wait: 5000ms

jwt:
  secret: ${JWT_SECRET:}  # MUST be set via env var  no fallback in production
  expiration: ${JWT_EXPIRATION:900000} # 15 minutes in milliseconds

# Auth configuration
auth:
  refresh-token:
    expiry-days: ${REFRESH_TOKEN_EXPIRY_DAYS:30} # Days before refresh token expires

server:
  port: ${SERVER_PORT:8443}
  servlet:
    context-path: /api  # All REST APIs now under /api prefix
  # Trust X-Forwarded-Proto/Host headers from nginx reverse proxy.
  # Required so Spring Boot generates correct https:// links in responses.
  forward-headers-strategy: native
  ssl:
    enabled: ${SSL_ENABLED:false}
  error:
    include-message: always
    include-stacktrace: on_param
  tomcat:
    threads:
      max: 500       # Default 200  not enough for 500-VU stress test
      min-spare: 50
    accept-count: 500  # Queue length when all threads are busy
    connection-timeout: 20000

---
# SSL profile  only loaded by local dev (.env.local: SPRING_PROFILES_ACTIVE=dev,ssl)
# Production uses nginx for TLS termination; Spring Boot runs plain HTTP internally.
spring:
  config:
    activate:
      on-profile: ssl
server:
  ssl:
    key-store: ${SSL_KEYSTORE}
    key-store-password: ${SSL_KEYSTORE_PASSWORD}
    key-store-type: ${SSL_KEYSTORE_TYPE:PKCS12}
    key-alias: ${SSL_KEY_ALIAS}

# API Base URL Configuration
api:
  base-url: ${API_BASE_URL:https://localhost:8443}
  use-https: ${USE_HTTPS:true}

# CORS Configuration  set CORS_ALLOWED_ORIGINS env var in production
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://localhost:3000,https://localhost:8443}
  security:
    # CSRF Protection: disable for testing/development, enable for production
    csrf-enabled: ${CSRF_ENABLED:false}
  rate-limit:
    # Set RATE_LIMIT_ENABLED=false in docker-compose for load testing / bypass
    # Never disable in production  prevents IP spam / brute-force attacks
    enabled: ${RATE_LIMIT_ENABLED:true}

logging:
  level:
    root: INFO
    com.nighthunt: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

#  Dedicated Server Configuration 
ds:
  vps:
    public-ip: ${VPS_PUBLIC_IP:127.0.0.1}

  port:
    start: ${DS_PORT_START:7777}
    end:   ${DS_PORT_END:7900}

  max-players: ${DS_MAX_PLAYERS:16}

  # Hard cap: max simultaneously active DS containers (starting + ready + in_game).
  # Prevents VPS OOM when many matches are requested at once.
  # Budget formula: (VPS_RAM_MB - infra_MB) / DS_MAX_MEMORY_MB
  #   8192 - 3000 (infra) = 5192 / 512 (per DS) = ~10    8 with headroom
  # Set to 0 to disable (not recommended in production).
  max-concurrent: ${DS_MAX_CONCURRENT:8}

  docker:
    # Docker image full ref (cp nht bi CI/CD qua /api/admin/ds/update-image)
    image-ref:           ${DS_IMAGE_REF:ghcr.io/nvanquyet/nighthunt-ds:latest}
    # URL backend m DS dng  gi v.
    # Docker internal (khuyn ngh): http://nighthunt-backend:8080  ~0.1ms, khng SSL
    # Fallback public domain:        https://vawnwuyest.me          ~50ms, qua nginx
    backend-internal-url: ${DS_BACKEND_INTERNAL_URL:http://nighthunt-backend:8080}
    max-memory-mb:       ${DS_MAX_MEMORY_MB:1024}
    # false = skip docker run (dng khi test local, khng c DS image)
    enabled:             ${DS_DOCKER_ENABLED:true}
    # GHCR credentials  docker login trc khi pull private image
    ghcr-token:          ${GHCR_TOKEN:}
    ghcr-owner:          ${GHCR_OWNER:}

  admin:
    # Secret dng cho CI/CD webhook (POST /api/admin/ds/update-image)
    # NOTE: Controllers read ${ADMIN_SECRET} directly to bypass nested-placeholder resolution.
    secret: ${ADMIN_SECRET:change-me-in-production}

#  Custom Game / Relay Configuration 
# Three modes (evaluated in order):
#
# Mode A  Full relay server (RECOMMENDED for production):
#   Set relay.server.url to the relay server's internal HTTP API URL.
#   The relay server (relay/relay_server.py) allocates a unique UDP port per session.
#   All players (host + clients) connect outbound to relay  works on any network/NAT.
#   relay.host = public IP/hostname of the relay server (sent to clients).
#   REQUIRES: relay_server.py running on VPS (see docker-compose.yml nighthunt-relay service).
#
# Mode B  Static host + fixed port (single concurrent game, no relay process):
#   Set relay.host to VPS public IP, leave relay.server.url blank.
#   Only 1 custom game can run at a time (all use same port).
#
# Mode C  Direct P2P (LAN / port-forward):
#   Leave both relay.server.url and relay.host blank.
#   Backend detects host player's IP from WebSocket connection.
#   Works on LAN; internet requires host to open RELAY_PORT on their router.
relay:
  server:
    url:  ${RELAY_SERVER_URL:}      # internal URL of relay_server.py, e.g. http://nighthunt-relay:7776
  host: ${RELAY_HOST:}              # public IP/hostname of relay VPS (sent to game clients)
  port: ${RELAY_PORT:7777}          # UDP port (Mode B/C only; Mode A uses dynamic allocation)
  session:
    ttl-hours: ${RELAY_SESSION_TTL_HOURS:2}

#  Spring Actuator (internal metrics  NOT exposed publicly via nginx) 
management:
  endpoints:
    web:
      exposure:
        # Added 'prometheus' for Grafana/Prometheus scraping (P2-1)
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
    metrics:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 100ms, 500ms, 1000ms
    # P2-1: allow nighthunt.* custom gauge metrics
    web:
      server:
        request:
          autotime:
            enabled: true

#  WebSocket gateway capacity (P2-2) 
# Soft warning threshold for active connections alert.
# Alert fires when active_connections > ws.capacity-warning-threshold.
nighthunt:
  realtime:
    # One-time credential exchanged by authenticated REST before WS connect.
    # The standalone gateway atomically consumes ws:ticket:<ticket> from Redis.
    ticket-ttl-seconds: ${WS_TICKET_TTL_SECONDS:45}
    ws-path: ${WS_PATH:/api/ws/game}
    nats:
      enabled: ${REALTIME_NATS_ENABLED:true}
      url: ${NATS_URL:nats://localhost:4222}
      subject-prefix: ${NATS_SUBJECT_PREFIX:rt.gateway}
    jetstream:
      enabled: ${JETSTREAM_OUTBOX_ENABLED:true}
      stream-name: ${JETSTREAM_STREAM_NAME:NIGHTHUNT_EVENTS}
      subjects: ${JETSTREAM_SUBJECTS:events.>}
      batch-size: ${JETSTREAM_OUTBOX_BATCH_SIZE:100}
      poll-delay-millis: ${JETSTREAM_OUTBOX_POLL_DELAY_MILLIS:500}
  ws:
    capacity-warning-threshold: ${WS_CAPACITY_WARNING:8000}
    # Max inbound payload bytes  frames larger than this are silently dropped
    max-payload-bytes: ${WS_MAX_PAYLOAD_BYTES:4096}
