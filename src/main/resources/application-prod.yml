# Production profile configuration
# Use this for production with HTTPS
server:
  port: 8443
  ssl:
    enabled: true
    key-store: ${SSL_KEYSTORE}
    key-store-password: ${SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12
    key-alias: ${SSL_KEY_ALIAS}

api:
  base-url: ${API_BASE_URL}
  use-https: true

logging:
  level:
    root: INFO
    com.nighthunt: INFO

