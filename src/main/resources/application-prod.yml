# Production profile configuration
# nginx handles TLS termination; Spring Boot runs plain HTTP internally
server:
  port: ${SERVER_PORT:8080}
  ssl:
    enabled: false

api:
  base-url: ${API_BASE_URL}
  use-https: true

logging:
  level:
    root: INFO
    com.nighthunt: INFO
  file:
    path: ${LOG_PATH:/app/logs}   # Docker volume: mount as /app/logs → persist across restarts

