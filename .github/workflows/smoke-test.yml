name: Smoke Tests (Production)

on:
  workflow_run:
    workflows: ["Build & Deploy Backend"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      target_url:
        description: 'API base URL to test (default: production)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  API_BASE: ${{ github.event.inputs.target_url || secrets.PRODUCTION_API_URL }}

jobs:
  # ── Only run if triggered manually OR if the upstream deploy succeeded ──────
  check-trigger:
    name: Check Deploy Status
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Flow 1: Health / Actuator ────────────────────────────────────────────────
  smoke-health:
    name: "Flow 1 – Health Check"
    runs-on: ubuntu-latest
    needs: check-trigger
    if: needs.check-trigger.outputs.should-run == 'true'
    steps:
      - name: GET /api/actuator/health
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' "$API_BASE/actuator/health")
          STATUS=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS | $BODY"
          [ "$STATUS" = "200" ] || (echo "FAIL: health check returned $STATUS" && exit 1)
          echo "$BODY" | grep -q '"status":"UP"' || (echo "FAIL: service not UP" && exit 1)

  # ── Flow 2: Auth – Register, Login, Refresh, Logout ─────────────────────────
  smoke-auth:
    name: "Flow 1+2 – Auth Lifecycle"
    runs-on: ubuntu-latest
    needs: smoke-health
    steps:
      - name: Register test user
        id: register
        run: |
          SUFFIX=$(date +%s)
          USERNAME="smoke_${SUFFIX}"
          EMAIL="smoke_${SUFFIX}@test.com"
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/auth/register" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$USERNAME\",\"email\":\"$EMAIL\",\"password\":\"Test@1234\",\"confirmPassword\":\"Test@1234\"}")
          STATUS=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS | $BODY"
          echo "$BODY" | grep -q '"success":true' || (echo "FAIL: register (HTTP $STATUS)" && exit 1)
          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"
          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"

      - name: Login → get tokens + sessionId
        id: login
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"identifier\":\"${{ steps.register.outputs.username }}\",\"password\":\"Test@1234\"}")
          STATUS=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS | $BODY"
          echo "$BODY" | grep -q '"success":true' || (echo "FAIL: login (HTTP $STATUS)" && exit 1)
          ACCESS=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['accessToken'])")
          REFRESH=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['refreshToken'])")
          SESSION=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'].get('sessionId',''))")
          [ -n "$ACCESS" ] && [ "$ACCESS" != "None" ] && [ "$ACCESS" != "null" ] \
            || (echo "FAIL: empty/null accessToken: '$ACCESS'" && exit 1)
          [ -n "$SESSION" ] && [ "$SESSION" != "None" ] && [ "$SESSION" != "null" ] \
            || (echo "FAIL: empty/null sessionId: '$SESSION'" && exit 1)
          echo "access=$ACCESS"   >> "$GITHUB_OUTPUT"
          echo "refresh=$REFRESH" >> "$GITHUB_OUTPUT"
          echo "session=$SESSION" >> "$GITHUB_OUTPUT"

      - name: Auto-login (check-session)
        continue-on-error: true
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/auth/auto-login" \
            -H "Content-Type: application/json" \
            -d "{\"accessToken\":\"${{ steps.login.outputs.access }}\",\"sessionId\":\"${{ steps.login.outputs.session }}\"}")
          STATUS=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS | $BODY"
          echo "$BODY" | grep -q '"success":true' || (echo "WARN: auto-login (HTTP $STATUS) — non-fatal" && exit 1)

      - name: Refresh token
        id: refresh
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/auth/refresh-token" \
            -H "Content-Type: application/json" \
            -d "{\"refreshToken\":\"${{ steps.login.outputs.refresh }}\"}")
          STATUS=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS | $BODY"
          echo "$BODY" | grep -q '"success":true' || (echo "FAIL: refresh-token (HTTP $STATUS)" && exit 1)
          NEW_ACCESS=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['accessToken'])")
          NEW_SESSION=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'].get('sessionId',''))")
          [ -n "$NEW_ACCESS" ] && [ "$NEW_ACCESS" != "None" ] && [ "$NEW_ACCESS" != "null" ] \
            || (echo "FAIL: invalid new accessToken: '$NEW_ACCESS'" && exit 1)
          # Use refreshed sessionId if returned, else fall back to login sessionId
          EFFECTIVE_SESSION="${NEW_SESSION:-${{ steps.login.outputs.session }}}"
          [ "$EFFECTIVE_SESSION" = "None" ] && EFFECTIVE_SESSION="${{ steps.login.outputs.session }}"
          echo "access=$NEW_ACCESS"             >> "$GITHUB_OUTPUT"
          echo "session=$EFFECTIVE_SESSION"     >> "$GITHUB_OUTPUT"

      - name: Logout
        run: |
          # Logout requires BOTH Authorization header AND X-Session-Id (server validates session in Redis)
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/auth/logout" \
            -H "Authorization: Bearer ${{ steps.refresh.outputs.access }}" \
            -H "X-Session-Id: ${{ steps.refresh.outputs.session }}")
          STATUS=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS | $BODY"
          [ "$STATUS" = "200" ] || (echo "FAIL: logout returned $STATUS" && exit 1)

  # ── Flow 3: Profile + Player State ──────────────────────────────────────────
  smoke-profile:
    name: "Flow 3+4 – Profile & Friends"
    runs-on: ubuntu-latest
    needs: [smoke-health, smoke-auth]
    if: always() && needs.smoke-health.result == 'success'
    steps:
      - name: Setup – create & login two test users
        id: setup
        run: |
          SUFFIX=$(date +%s)
          # User A
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/auth/register" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"smokeA_${SUFFIX}\",\"email\":\"smokeA_${SUFFIX}@t.com\",\"password\":\"Test@1234\",\"confirmPassword\":\"Test@1234\"}")
          S=$(echo "$RESPONSE" | tail -1); echo "Register A → HTTP $S"
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"identifier\":\"smokeA_${SUFFIX}\",\"password\":\"Test@1234\"}")
          S=$(echo "$RESPONSE" | tail -1); BODY_A=$(echo "$RESPONSE" | head -n -1)
          echo "Login A → HTTP $S | $BODY_A"
          TOKEN_A=$(echo "$BODY_A" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['accessToken'])")
          SESSION_A=$(echo "$BODY_A" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'].get('sessionId',''))")
          USER_A=$(echo "$BODY_A" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['userId'])")
          [ -n "$TOKEN_A" ] && [ "$TOKEN_A" != "None" ] && [ "$TOKEN_A" != "null" ] \
            || (echo "FAIL: login A failed (HTTP $S), token='$TOKEN_A'" && exit 1)
          [ -n "$SESSION_A" ] && [ "$SESSION_A" != "None" ] && [ "$SESSION_A" != "null" ] \
            || (echo "FAIL: login A no sessionId (HTTP $S), session='$SESSION_A'" && exit 1)
          # User B
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/auth/register" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"smokeB_${SUFFIX}\",\"email\":\"smokeB_${SUFFIX}@t.com\",\"password\":\"Test@1234\",\"confirmPassword\":\"Test@1234\"}")
          S=$(echo "$RESPONSE" | tail -1); echo "Register B → HTTP $S"
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"identifier\":\"smokeB_${SUFFIX}\",\"password\":\"Test@1234\"}")
          S=$(echo "$RESPONSE" | tail -1); BODY_B=$(echo "$RESPONSE" | head -n -1)
          echo "Login B → HTTP $S | $BODY_B"
          TOKEN_B=$(echo "$BODY_B" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['accessToken'])")
          SESSION_B=$(echo "$BODY_B" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'].get('sessionId',''))")
          USER_B=$(echo "$BODY_B" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['userId'])")
          [ -n "$TOKEN_B" ] && [ "$TOKEN_B" != "None" ] && [ "$TOKEN_B" != "null" ] \
            || (echo "FAIL: login B failed (HTTP $S), token='$TOKEN_B'" && exit 1)
          [ -n "$SESSION_B" ] && [ "$SESSION_B" != "None" ] && [ "$SESSION_B" != "null" ] \
            || (echo "FAIL: login B no sessionId (HTTP $S), session='$SESSION_B'" && exit 1)
          echo "tokenA=$TOKEN_A"     >> "$GITHUB_OUTPUT"
          echo "sessionA=$SESSION_A" >> "$GITHUB_OUTPUT"
          echo "tokenB=$TOKEN_B"     >> "$GITHUB_OUTPUT"
          echo "sessionB=$SESSION_B" >> "$GITHUB_OUTPUT"
          echo "userA=$USER_A"       >> "$GITHUB_OUTPUT"
          echo "userB=$USER_B"       >> "$GITHUB_OUTPUT"

      - name: GET /api/profile (my profile)
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' "$API_BASE/profile" \
            -H "Authorization: Bearer ${{ steps.setup.outputs.tokenA }}" \
            -H "X-Session-Id: ${{ steps.setup.outputs.sessionA }}")
          STATUS=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS | $BODY"
          echo "$BODY" | grep -q '"success":true' || (echo "FAIL: get profile (HTTP $STATUS)" && exit 1)

      - name: GET /api/profile/{userId} (public profile)
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' "$API_BASE/profile/${{ steps.setup.outputs.userB }}" \
            -H "Authorization: Bearer ${{ steps.setup.outputs.tokenA }}" \
            -H "X-Session-Id: ${{ steps.setup.outputs.sessionA }}")
          STATUS=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS | $BODY"
          echo "$BODY" | grep -q '"success":true' || (echo "FAIL: public profile (HTTP $STATUS)" && exit 1)

      - name: Friend flow – send / accept / list / remove
        run: |
          TOKEN_A="${{ steps.setup.outputs.tokenA }}"
          SID_A="${{ steps.setup.outputs.sessionA }}"
          TOKEN_B="${{ steps.setup.outputs.tokenB }}"
          SID_B="${{ steps.setup.outputs.sessionB }}"
          USER_B="${{ steps.setup.outputs.userB }}"
          # Send request A→B
          R=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/friends/requests" \
            -H "Authorization: Bearer $TOKEN_A" -H "X-Session-Id: $SID_A" \
            -H "Content-Type: application/json" -d "{\"userId\":$USER_B}")
          S=$(echo "$R" | tail -1); B=$(echo "$R" | head -n -1)
          echo "Send friend request → HTTP $S | $B"
          echo "$B" | grep -q '"success":true' || (echo "FAIL: send friend request (HTTP $S)" && exit 1)
          # B gets incoming requests
          R=$(curl -s -w '\n%{http_code}' "$API_BASE/friends/requests/incoming" \
            -H "Authorization: Bearer $TOKEN_B" -H "X-Session-Id: $SID_B")
          S=$(echo "$R" | tail -1); BODY=$(echo "$R" | head -n -1)
          echo "Incoming requests → HTTP $S | $BODY"
          echo "$BODY" | grep -q '"success":true' || (echo "FAIL: incoming requests (HTTP $S)" && exit 1)
          REQ_ID=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'][0]['requestId'])")
          # B accepts
          R=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/friends/requests/${REQ_ID}/accept" \
            -H "Authorization: Bearer $TOKEN_B" -H "X-Session-Id: $SID_B")
          S=$(echo "$R" | tail -1); B=$(echo "$R" | head -n -1)
          echo "Accept request → HTTP $S | $B"
          echo "$B" | grep -q '"success":true' || (echo "FAIL: accept request (HTTP $S)" && exit 1)
          # A gets friends list
          R=$(curl -s -w '\n%{http_code}' "$API_BASE/friends" \
            -H "Authorization: Bearer $TOKEN_A" -H "X-Session-Id: $SID_A")
          S=$(echo "$R" | tail -1); B=$(echo "$R" | head -n -1)
          echo "Friend list → HTTP $S | $B"
          echo "$B" | grep -q '"success":true' || (echo "FAIL: friend list (HTTP $S)" && exit 1)
          # A removes friend
          R=$(curl -s -w '\n%{http_code}' -X DELETE "$API_BASE/friends/$USER_B" \
            -H "Authorization: Bearer $TOKEN_A" -H "X-Session-Id: $SID_A")
          S=$(echo "$R" | tail -1); B=$(echo "$R" | head -n -1)
          echo "Remove friend → HTTP $S | $B"
          echo "$B" | grep -q '"success":true' || (echo "FAIL: remove friend (HTTP $S)" && exit 1)

  # ── Flow 2: Matchmaking queue ────────────────────────────────────────────────
  smoke-matchmaking:
    name: "Flow 2 – Matchmaking Queue"
    runs-on: ubuntu-latest
    needs: [smoke-health, smoke-profile]
    if: always() && needs.smoke-health.result == 'success'
    steps:
      - name: Setup – register & login test user
        id: login
        run: |
          SUFFIX=$(date +%s)
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/auth/register" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"smokeQ_${SUFFIX}\",\"email\":\"smokeQ_${SUFFIX}@t.com\",\"password\":\"Test@1234\",\"confirmPassword\":\"Test@1234\"}")
          S=$(echo "$RESPONSE" | tail -1); echo "Register smokeQ → HTTP $S"
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"identifier\":\"smokeQ_${SUFFIX}\",\"password\":\"Test@1234\"}")
          S=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Login smokeQ → HTTP $S | $BODY"
          TOKEN=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['accessToken'])")
          SESSION=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'].get('sessionId',''))")
          [ -n "$TOKEN" ] && [ "$TOKEN" != "None" ] && [ "$TOKEN" != "null" ] \
            || (echo "FAIL: matchmaking login failed (HTTP $S), token='$TOKEN'" && exit 1)
          [ -n "$SESSION" ] && [ "$SESSION" != "None" ] && [ "$SESSION" != "null" ] \
            || (echo "FAIL: matchmaking login no sessionId (HTTP $S)" && exit 1)
          echo "token=$TOKEN"     >> "$GITHUB_OUTPUT"
          echo "session=$SESSION" >> "$GITHUB_OUTPUT"

      - name: Enqueue for matchmaking
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/matchmaking/queue" \
            -H "Authorization: Bearer ${{ steps.login.outputs.token }}" \
            -H "X-Session-Id: ${{ steps.login.outputs.session }}" \
            -H "Content-Type: application/json" \
            -d '{"gameMode":"2v2"}')
          STATUS=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS | $BODY"
          echo "$BODY" | grep -q '"success":true' || (echo "FAIL: enqueue (HTTP $STATUS)" && exit 1)

      - name: Dequeue from matchmaking
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' -X DELETE "$API_BASE/matchmaking/queue" \
            -H "Authorization: Bearer ${{ steps.login.outputs.token }}" \
            -H "X-Session-Id: ${{ steps.login.outputs.session }}")
          STATUS=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS | $BODY"
          echo "$BODY" | grep -q '"success":true' || (echo "FAIL: dequeue (HTTP $STATUS)" && exit 1)

  # ── Flow 5: DS registration (smoke only – no real Docker) ───────────────────
  smoke-ds:
    name: "Flow 5 – DS Registration"
    runs-on: ubuntu-latest
    needs: [smoke-health, smoke-matchmaking]
    if: always() && needs.smoke-health.result == 'success'
    steps:
      - name: POST /api/ds/register (invalid secret → 401)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$API_BASE/ds/register" \
            -H "X-DS-Secret: invalid_secret" \
            -H "Content-Type: application/json" \
            -d '{"serverId":"smoke-test","gamePort":7770,"maxPlayers":4,"expectedPlayers":4,"mapId":"map_01"}')
          echo "HTTP $STATUS"
          [[ "$STATUS" = "401" || "$STATUS" = "403" ]] \
            || (echo "FAIL: expected 401/403, got $STATUS" && exit 1)

  # ── Flow 6: Custom game — Room create → join → ready → start → relay ────────
  smoke-custom-game:
    name: "Flow 6 – Custom Game (Room + Relay)"
    runs-on: ubuntu-latest
    needs: [smoke-health, smoke-ds]
    if: always() && needs.smoke-health.result == 'success'
    steps:
      - name: Setup – register & login Host (A) and Player (B)
        id: setup
        run: |
          SUFFIX=$(date +%s)
          # Register + login Host (A)
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/auth/register" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"cgA_${SUFFIX}\",\"email\":\"cgA_${SUFFIX}@t.com\",\"password\":\"Test@1234\",\"confirmPassword\":\"Test@1234\"}")
          S=$(echo "$RESPONSE" | tail -1); echo "Register cgA → HTTP $S"
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"identifier\":\"cgA_${SUFFIX}\",\"password\":\"Test@1234\"}")
          S=$(echo "$RESPONSE" | tail -1); BODY_A=$(echo "$RESPONSE" | head -n -1)
          echo "Login cgA → HTTP $S | $BODY_A"
          TOKEN_A=$(echo "$BODY_A" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['accessToken'])")
          SESSION_A=$(echo "$BODY_A" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'].get('sessionId',''))")
          [ -n "$TOKEN_A" ] && [ "$TOKEN_A" != "None" ] && [ "$TOKEN_A" != "null" ] \
            || (echo "FAIL: login cgA failed (HTTP $S), token='$TOKEN_A'" && exit 1)
          [ -n "$SESSION_A" ] && [ "$SESSION_A" != "None" ] && [ "$SESSION_A" != "null" ] \
            || (echo "FAIL: login cgA no sessionId (HTTP $S)" && exit 1)
          # Register + login Player (B)
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/auth/register" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"cgB_${SUFFIX}\",\"email\":\"cgB_${SUFFIX}@t.com\",\"password\":\"Test@1234\",\"confirmPassword\":\"Test@1234\"}")
          S=$(echo "$RESPONSE" | tail -1); echo "Register cgB → HTTP $S"
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"identifier\":\"cgB_${SUFFIX}\",\"password\":\"Test@1234\"}")
          S=$(echo "$RESPONSE" | tail -1); BODY_B=$(echo "$RESPONSE" | head -n -1)
          echo "Login cgB → HTTP $S | $BODY_B"
          TOKEN_B=$(echo "$BODY_B" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['accessToken'])")
          SESSION_B=$(echo "$BODY_B" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'].get('sessionId',''))")
          [ -n "$TOKEN_B" ] && [ "$TOKEN_B" != "None" ] && [ "$TOKEN_B" != "null" ] \
            || (echo "FAIL: login cgB failed (HTTP $S), token='$TOKEN_B'" && exit 1)
          [ -n "$SESSION_B" ] && [ "$SESSION_B" != "None" ] && [ "$SESSION_B" != "null" ] \
            || (echo "FAIL: login cgB no sessionId (HTTP $S)" && exit 1)
          echo "tokenA=$TOKEN_A"     >> "$GITHUB_OUTPUT"
          echo "sessionA=$SESSION_A" >> "$GITHUB_OUTPUT"
          echo "tokenB=$TOKEN_B"     >> "$GITHUB_OUTPUT"
          echo "sessionB=$SESSION_B" >> "$GITHUB_OUTPUT"

      - name: Host creates custom room
        id: create
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/rooms/create" \
            -H "Authorization: Bearer ${{ steps.setup.outputs.tokenA }}" \
            -H "X-Session-Id: ${{ steps.setup.outputs.sessionA }}" \
            -H "Content-Type: application/json" \
            -d '{"mode":"2v2","isPublic":true,"isLocked":false}')
          STATUS=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS | $BODY"
          echo "$BODY" | grep -q '"success":true' || (echo "FAIL: create room (HTTP $STATUS)" && exit 1)
          ROOM_ID=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['roomId'])")
          ROOM_CODE=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['roomCode'])")
          echo "roomId=$ROOM_ID"     >> "$GITHUB_OUTPUT"
          echo "roomCode=$ROOM_CODE" >> "$GITHUB_OUTPUT"
          echo "Room created: id=${ROOM_ID} code=${ROOM_CODE}"

      - name: Player B joins room by code
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/rooms/join-by-code" \
            -H "Authorization: Bearer ${{ steps.setup.outputs.tokenB }}" \
            -H "X-Session-Id: ${{ steps.setup.outputs.sessionB }}" \
            -H "Content-Type: application/json" \
            -d "{\"roomCode\":\"${{ steps.create.outputs.roomCode }}\"}")
          STATUS=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS | $BODY"
          echo "$BODY" | grep -q '"success":true' || (echo "FAIL: join room (HTTP $STATUS)" && exit 1)

      - name: Both players mark ready
        run: |
          ROOM_ID="${{ steps.create.outputs.roomId }}"
          TOKEN_A="${{ steps.setup.outputs.tokenA }}"; SID_A="${{ steps.setup.outputs.sessionA }}"
          TOKEN_B="${{ steps.setup.outputs.tokenB }}"; SID_B="${{ steps.setup.outputs.sessionB }}"
          R=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/rooms/${ROOM_ID}/ready" \
            -H "Authorization: Bearer $TOKEN_A" -H "X-Session-Id: $SID_A" \
            -H "Content-Type: application/json" -d '{"isReady":true}')
          S=$(echo "$R" | tail -1); B=$(echo "$R" | head -n -1)
          echo "Host ready → HTTP $S | $B"
          echo "$B" | grep -q '"success":true' || (echo "FAIL: host ready (HTTP $S)" && exit 1)
          R=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/rooms/${ROOM_ID}/ready" \
            -H "Authorization: Bearer $TOKEN_B" -H "X-Session-Id: $SID_B" \
            -H "Content-Type: application/json" -d '{"isReady":true}')
          S=$(echo "$R" | tail -1); B=$(echo "$R" | head -n -1)
          echo "Player B ready → HTTP $S | $B"
          echo "$B" | grep -q '"success":true' || (echo "FAIL: player B ready (HTTP $S)" && exit 1)

      - name: Host starts game
        id: start
        # Non-fatal: start may fail in CI if no DS container is configured
        continue-on-error: true
        run: |
          ROOM_ID="${{ steps.create.outputs.roomId }}"
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/rooms/${ROOM_ID}/start" \
            -H "Authorization: Bearer ${{ steps.setup.outputs.tokenA }}" \
            -H "X-Session-Id: ${{ steps.setup.outputs.sessionA }}")
          STATUS=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS | $BODY"
          echo "$BODY" | grep -q '"success":true' \
            || echo "WARN: start game returned (HTTP $STATUS) — no DS in CI environment"

      - name: Verify relay session created (GET /api/relay/room/{roomId})
        # Non-fatal: relay session only exists when a real DS boots and registers
        continue-on-error: true
        run: |
          ROOM_ID="${{ steps.create.outputs.roomId }}"
          RESPONSE=$(curl -s -w '\n%{http_code}' "$API_BASE/relay/room/${ROOM_ID}" \
            -H "Authorization: Bearer ${{ steps.setup.outputs.tokenA }}" \
            -H "X-Session-Id: ${{ steps.setup.outputs.sessionA }}")
          STATUS=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS | $BODY"
          if [ "$STATUS" = "200" ]; then
            RELAY_HOST=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'].get('relayHost',''))")
            RELAY_PORT=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'].get('relayPort',0))")
            echo "✅ Relay: ${RELAY_HOST}:${RELAY_PORT}"
          else
            echo "WARN: no relay session (HTTP $STATUS) — expected in CI without real DS"
          fi

      - name: Player B registers join in relay
        # Non-fatal: relay only works when DS is running
        continue-on-error: true
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' "$API_BASE/relay/room/${{ steps.create.outputs.roomId }}" \
            -H "Authorization: Bearer ${{ steps.setup.outputs.tokenB }}" \
            -H "X-Session-Id: ${{ steps.setup.outputs.sessionB }}")
          S=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Relay session for B → HTTP $S | $BODY"
          SESSION_TOKEN=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'].get('sessionToken',''))" 2>/dev/null || echo "")
          echo "session token: ${SESSION_TOKEN}"
          JOIN_RESP=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/relay/join" \
            -H "Authorization: Bearer ${{ steps.setup.outputs.tokenB }}" \
            -H "X-Session-Id: ${{ steps.setup.outputs.sessionB }}" \
            -H "Content-Type: application/json" \
            -d "{\"sessionToken\":\"${SESSION_TOKEN}\"}")
          S=$(echo "$JOIN_RESP" | tail -1); B=$(echo "$JOIN_RESP" | head -n -1)
          echo "Relay join → HTTP $S | $B"
          echo "Relay join attempted (non-fatal — relay requires live DS)"

  # ── Flow 7: DS Admin — update-image endpoint ────────────────────────────────
  smoke-ds-admin:
    name: "Flow 7 – DS Admin update-image"
    runs-on: ubuntu-latest
    needs: [smoke-health, smoke-custom-game]
    if: always() && needs.smoke-health.result == 'success'
    steps:
      - name: POST /api/admin/ds/update-image (valid admin secret)
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/admin/ds/update-image" \
            -H "Content-Type: application/json" \
            -H "X-Admin-Secret: ${{ secrets.BACKEND_ADMIN_SECRET }}" \
            -d '{"imageRef":"ghcr.io/nvanquyet/nighthunt-ds:latest","version":"smoke-test"}')
          STATUS=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS | $BODY"
          # 200 = success; 500 = Docker daemon issue on server (non-fatal for smoke)
          if [ "$STATUS" = "200" ]; then
            echo "$BODY" | grep -q '"success":true' \
              || (echo "FAIL: ds update-image returned 200 but success=false (auth/input issue)" && exit 1)
            echo "✅ DS Admin update-image OK"
          elif [ "$STATUS" = "500" ]; then
            echo "WARN: update-image returned 500 (Docker daemon may be unavailable on server — non-fatal)"
          else
            echo "FAIL: ds update-image unexpected status $STATUS" && exit 1
          fi

      - name: POST /api/admin/ds/update-image (invalid secret → 401/403)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$API_BASE/admin/ds/update-image" \
            -H "Content-Type: application/json" \
            -H "X-Admin-Secret: totally-wrong-secret" \
            -d '{"imageRef":"ghcr.io/nvanquyet/nighthunt-ds:latest","version":"latest"}')
          echo "HTTP $STATUS"
          # Accept 200 (if controller returns ApiResponse.error()) or 401/403
          # Controller currently returns ApiResponse.error() with HTTP 200 for wrong secret
          [[ "$STATUS" = "401" || "$STATUS" = "403" || "$STATUS" = "200" ]] \
            || (echo "FAIL: unexpected status for bad secret: $STATUS" && exit 1)
          echo "✅ Bad secret handled (HTTP $STATUS)"

      - name: GET /api/admin/ds/servers (list active DS containers)
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' "$API_BASE/admin/ds/servers" \
            -H "X-Admin-Secret: ${{ secrets.BACKEND_ADMIN_SECRET }}")
          STATUS=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS | $BODY"
          if [ "$STATUS" = "200" ]; then
            echo "$BODY" | grep -q '"success":true' \
              || (echo "FAIL: ds servers list returned 200 but success=false" && exit 1)
            echo "✅ DS servers list OK"
          elif [ "$STATUS" = "500" ]; then
            echo "WARN: ds servers list returned 500 (Docker daemon may be unavailable — non-fatal)"
          else
            echo "FAIL: ds servers list unexpected status $STATUS" && exit 1
          fi

  # ── Flow 8: Dashboard stats ──────────────────────────────────────────────────
  smoke-dashboard:
    name: "Flow 8 – Dashboard Stats"
    runs-on: ubuntu-latest
    needs: [smoke-health, smoke-ds-admin]
    if: always() && needs.smoke-health.result == 'success'
    steps:
      - name: GET /api/dashboard/stats (requires admin secret)
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' "$API_BASE/dashboard/stats" \
            -H "X-Admin-Secret: ${{ secrets.BACKEND_ADMIN_SECRET }}")
          STATUS=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS | $BODY"
          echo "$BODY" | grep -q '"success":true' \
            || echo "WARN: dashboard stats (HTTP $STATUS) — may require active data"

  # ── Flow 9: Relay server health ──────────────────────────────────────────────
  smoke-relay-health:
    name: "Flow 9 – Relay Server Health"
    runs-on: ubuntu-latest
    needs: [smoke-health, smoke-dashboard]
    if: always() && needs.smoke-health.result == 'success'
    steps:
      - name: GET /api/relay/health (backend proxies to relay server)
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' "$API_BASE/relay/health")
          STATUS=$(echo "$RESPONSE" | tail -1); BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS | $BODY"
          [ "$STATUS" = "200" ] || (echo "FAIL: relay health returned $STATUS" && exit 1)
          echo "$BODY" | grep -q '"success":true' \
            || (echo "FAIL: relay health success=false" && exit 1)
          # Check relay is UP or in direct mode
          MODE=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'].get('mode','relay'))" 2>/dev/null || echo "relay")
          if [ "$MODE" = "direct" ]; then
            echo "ℹ️ Relay in direct mode (no relay server URL configured)"
          else
            RELAY_STATUS=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'].get('status','unknown'))" 2>/dev/null || echo "unknown")
            FREE=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'].get('free_ports','?'))" 2>/dev/null || echo "?")
            SESSIONS=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'].get('sessions','?'))" 2>/dev/null || echo "?")
            echo "✅ Relay status=$RELAY_STATUS | sessions=$SESSIONS | free_ports=$FREE"
            [ "$RELAY_STATUS" = "ok" ] || [ "$RELAY_STATUS" = "unreachable" ] \
              || (echo "FAIL: unexpected relay status '$RELAY_STATUS'" && exit 1)
            if [ "$RELAY_STATUS" = "unreachable" ]; then
              echo "⚠️  WARN: relay server unreachable — check VPS docker ps / nighthunt-relay container"
            fi
          fi

      - name: UDP connectivity check — relay port range (7777-7780)
        # Non-fatal: verifies firewall allows UDP traffic on relay ports
        continue-on-error: true
        run: |
          VPS_HOST=$(echo "$API_BASE" | sed 's|https\?://||' | cut -d/ -f1 | cut -d: -f1)
          echo "Testing UDP to $VPS_HOST:7777-7780 (nc -uz)"
          for PORT in 7777 7778 7779 7780; do
            if nc -uz -w2 "$VPS_HOST" "$PORT" 2>/dev/null; then
              echo "✅ UDP $PORT reachable"
            else
              echo "⚠️  UDP $PORT unreachable (no active relay session on this port — expected)"
            fi
          done

  # ── Flow 10: DS full lifecycle simulation ────────────────────────────────────
  smoke-ds-lifecycle:
    name: "Flow 10 – DS Lifecycle (register → game-ready)"
    runs-on: ubuntu-latest
    needs: [smoke-health, smoke-relay-health]
    if: always() && needs.smoke-health.result == 'success'
    steps:
      - name: Setup – register & login 4 test users (2v2 match simulation)
        id: setup
        run: |
          SUFFIX=$(date +%s)
          for PLAYER in A B C D; do
            R=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/auth/register" \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"ds${PLAYER}_${SUFFIX}\",\"email\":\"ds${PLAYER}_${SUFFIX}@t.com\",\"password\":\"Test@1234\",\"confirmPassword\":\"Test@1234\"}")
            echo "Register ds${PLAYER} → HTTP $(echo "$R" | tail -1)"
            R=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/auth/login" \
              -H "Content-Type: application/json" \
              -d "{\"identifier\":\"ds${PLAYER}_${SUFFIX}\",\"password\":\"Test@1234\"}")
            S=$(echo "$R" | tail -1); BODY=$(echo "$R" | head -n -1)
            echo "Login ds${PLAYER} → HTTP $S"
            TOKEN=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['accessToken'])")
            SESSION=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'].get('sessionId',''))")
            [ -n "$TOKEN" ] && [ "$TOKEN" != "None" ] \
              || (echo "FAIL: login ds${PLAYER} failed" && exit 1)
            echo "token${PLAYER}=$TOKEN"   >> "$GITHUB_OUTPUT"
            echo "session${PLAYER}=$SESSION" >> "$GITHUB_OUTPUT"
          done

      - name: Host creates 2v2 ranked room
        id: room
        run: |
          R=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/rooms/create" \
            -H "Authorization: Bearer ${{ steps.setup.outputs.tokenA }}" \
            -H "X-Session-Id: ${{ steps.setup.outputs.sessionA }}" \
            -H "Content-Type: application/json" \
            -d '{"mode":"2v2","isPublic":false,"isLocked":false}')
          S=$(echo "$R" | tail -1); BODY=$(echo "$R" | head -n -1)
          echo "Create room → HTTP $S | $BODY"
          echo "$BODY" | grep -q '"success":true' || (echo "FAIL: create room (HTTP $S)" && exit 1)
          ROOM_ID=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['roomId'])")
          ROOM_CODE=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['roomCode'])")
          echo "roomId=$ROOM_ID"     >> "$GITHUB_OUTPUT"
          echo "roomCode=$ROOM_CODE" >> "$GITHUB_OUTPUT"

      - name: Players B/C/D join room
        run: |
          ROOM_CODE="${{ steps.room.outputs.roomCode }}"
          for PLAYER in B C D; do
            TOKEN_VAR="token${PLAYER}"
            SID_VAR="session${PLAYER}"
            R=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/rooms/join-by-code" \
              -H "Authorization: Bearer ${{ steps.setup.outputs[format('token{0}', env.PLAYER)] }}" \
              -H "X-Session-Id: ${{ steps.setup.outputs[format('session{0}', env.PLAYER)] }}" \
              -H "Content-Type: application/json" \
              -d "{\"roomCode\":\"$ROOM_CODE\"}" 2>/dev/null || echo "join attempted")
            echo "Player $PLAYER join → HTTP $(echo "$R" | tail -1)"
          done
          # Simpler: join B, C, D with individual curls
          R=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/rooms/join-by-code" \
            -H "Authorization: Bearer ${{ steps.setup.outputs.tokenB }}" \
            -H "X-Session-Id: ${{ steps.setup.outputs.sessionB }}" \
            -H "Content-Type: application/json" -d "{\"roomCode\":\"$ROOM_CODE\"}")
          echo "B join → HTTP $(echo "$R" | tail -1)"
          R=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/rooms/join-by-code" \
            -H "Authorization: Bearer ${{ steps.setup.outputs.tokenC }}" \
            -H "X-Session-Id: ${{ steps.setup.outputs.sessionC }}" \
            -H "Content-Type: application/json" -d "{\"roomCode\":\"$ROOM_CODE\"}")
          echo "C join → HTTP $(echo "$R" | tail -1)"
          R=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/rooms/join-by-code" \
            -H "Authorization: Bearer ${{ steps.setup.outputs.tokenD }}" \
            -H "X-Session-Id: ${{ steps.setup.outputs.sessionD }}" \
            -H "Content-Type: application/json" -d "{\"roomCode\":\"$ROOM_CODE\"}")
          echo "D join → HTTP $(echo "$R" | tail -1)"

      - name: All 4 players mark ready
        run: |
          ROOM_ID="${{ steps.room.outputs.roomId }}"
          for PAIR in "A/${{ steps.setup.outputs.tokenA }}/${{ steps.setup.outputs.sessionA }}" \
                      "B/${{ steps.setup.outputs.tokenB }}/${{ steps.setup.outputs.sessionB }}" \
                      "C/${{ steps.setup.outputs.tokenC }}/${{ steps.setup.outputs.sessionC }}" \
                      "D/${{ steps.setup.outputs.tokenD }}/${{ steps.setup.outputs.sessionD }}"; do
            PLAYER=$(echo "$PAIR" | cut -d/ -f1)
            TOKEN=$(echo  "$PAIR" | cut -d/ -f2)
            SID=$(echo    "$PAIR" | cut -d/ -f3)
            R=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/rooms/${ROOM_ID}/ready" \
              -H "Authorization: Bearer $TOKEN" -H "X-Session-Id: $SID" \
              -H "Content-Type: application/json" -d '{"isReady":true}')
            S=$(echo "$R" | tail -1)
            echo "Player $PLAYER ready → HTTP $S"
            echo "$(echo "$R" | head -n -1)" | grep -q '"success":true' \
              || echo "WARN: player $PLAYER ready failed (HTTP $S)"
          done

      - name: Host starts game → triggers DS spin-up
        id: start
        # Non-fatal: DS docker may not be configured in CI; important is the API response structure
        continue-on-error: true
        run: |
          ROOM_ID="${{ steps.room.outputs.roomId }}"
          R=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/rooms/${ROOM_ID}/start" \
            -H "Authorization: Bearer ${{ steps.setup.outputs.tokenA }}" \
            -H "X-Session-Id: ${{ steps.setup.outputs.sessionA }}")
          S=$(echo "$R" | tail -1); BODY=$(echo "$R" | head -n -1)
          echo "Start game → HTTP $S | $BODY"
          if [ "$S" = "200" ]; then
            echo "$BODY" | grep -q '"success":true' \
              && echo "✅ startGame OK — DS spin-up initiated" \
              || echo "WARN: startGame returned 200 but success=false"
          else
            echo "WARN: startGame returned $S (DS docker may be disabled — non-fatal in CI)"
          fi
          # Extract matchId if available
          MATCH_ID=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'].get('matchId',''))" 2>/dev/null || echo "")
          echo "matchId=${MATCH_ID}" >> "$GITHUB_OUTPUT"

      - name: Simulate DS register callback (POST /api/ds/register)
        # Non-fatal: requires real DS_ADMIN_SECRET to match server config
        continue-on-error: true
        run: |
          MATCH_ID="${{ steps.start.outputs.matchId }}"
          if [ -z "$MATCH_ID" ] || [ "$MATCH_ID" = "None" ]; then
            echo "SKIP: no matchId from startGame (DS not launched in CI)"
            exit 0
          fi
          SERVER_ID="smoke-ds-$(date +%s)"
          R=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/ds/register" \
            -H "Content-Type: application/json" \
            -H "X-DS-Secret: ${{ secrets.DS_ADMIN_SECRET }}" \
            -d "{\"serverId\":\"${SERVER_ID}\",\"serverSecret\":\"${{ secrets.DS_ADMIN_SECRET }}\",\"gamePort\":9001,\"maxPlayers\":4,\"expectedPlayers\":4,\"mapId\":\"map_test\",\"matchId\":\"${MATCH_ID}\"}")
          S=$(echo "$R" | tail -1); BODY=$(echo "$R" | head -n -1)
          echo "DS register → HTTP $S | $BODY"
          [ "$S" = "200" ] || echo "WARN: DS register returned $S (non-fatal — secret mismatch or no match)"
          echo "serverId=${SERVER_ID}" >> "$GITHUB_OUTPUT"

      - name: Simulate DS game-ready callback (POST /api/ds/game-ready)
        # Non-fatal: only works if register succeeded with a valid match
        continue-on-error: true
        run: |
          SERVER_ID="${{ steps.simulate.outputs.serverId }}"
          if [ -z "$SERVER_ID" ]; then
            echo "SKIP: no serverId (DS register skipped)"
            exit 0
          fi
          R=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/ds/game-ready" \
            -H "Content-Type: application/json" \
            -H "X-DS-Secret: ${{ secrets.DS_ADMIN_SECRET }}" \
            -d "{\"serverId\":\"${SERVER_ID}\",\"serverSecret\":\"${{ secrets.DS_ADMIN_SECRET }}\"}")
          S=$(echo "$R" | tail -1); BODY=$(echo "$R" | head -n -1)
          echo "DS game-ready → HTTP $S | $BODY"
          [ "$S" = "200" ] || echo "WARN: DS game-ready returned $S (non-fatal)"

      - name: Validate DS session token (POST /api/ds/validate-token)
        # Validates that the backend correctly rejects expired/unknown tokens
        run: |
          R=$(curl -s -w '\n%{http_code}' -X POST "$API_BASE/ds/validate-token" \
            -H "Content-Type: application/json" \
            -d '{"token":"invalid-smoke-token","serverId":"smoke-fake"}')
          S=$(echo "$R" | tail -1); BODY=$(echo "$R" | head -n -1)
          echo "Validate invalid token → HTTP $S | $BODY"
          [ "$S" = "200" ] || (echo "FAIL: validate-token unexpected status $S" && exit 1)
          VALID=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'])" 2>/dev/null || echo "false")
          [ "$VALID" = "False" ] || [ "$VALID" = "false" ] \
            && echo "✅ Invalid token correctly rejected" \
            || echo "WARN: unexpected validation result: $VALID"

  # ── Summary ──────────────────────────────────────────────────────────────────
  smoke-summary:
    name: "Smoke Test Summary"
    runs-on: ubuntu-latest
    needs:
      - smoke-health
      - smoke-auth
      - smoke-profile
      - smoke-matchmaking
      - smoke-ds
      - smoke-custom-game
      - smoke-ds-admin
      - smoke-dashboard
      - smoke-relay-health
      - smoke-ds-lifecycle
    if: always()
    steps:
      - name: Report results
        run: |
          echo "=== Smoke Test Results ==="
          echo "Health:          ${{ needs.smoke-health.result }}"
          echo "Auth:            ${{ needs.smoke-auth.result }}"
          echo "Profile/Friends: ${{ needs.smoke-profile.result }}"
          echo "Matchmaking:     ${{ needs.smoke-matchmaking.result }}"
          echo "DS Register:     ${{ needs.smoke-ds.result }}"
          echo "Custom Game:     ${{ needs.smoke-custom-game.result }}"
          echo "DS Admin:        ${{ needs.smoke-ds-admin.result }}"
          echo "Dashboard:       ${{ needs.smoke-dashboard.result }}"
          echo "Relay Health:    ${{ needs.smoke-relay-health.result }}"
          echo "DS Lifecycle:    ${{ needs.smoke-ds-lifecycle.result }}"
          if [[ "${{ needs.smoke-health.result }}"          != "success" || \
                "${{ needs.smoke-auth.result }}"            != "success" || \
                "${{ needs.smoke-profile.result }}"         != "success" || \
                "${{ needs.smoke-matchmaking.result }}"     != "success" || \
                "${{ needs.smoke-custom-game.result }}"     != "success" || \
                "${{ needs.smoke-relay-health.result }}"    != "success" ]]; then
            echo "CRITICAL smoke tests FAILED"
            exit 1
          fi
          echo "All critical smoke tests passed ✓"
