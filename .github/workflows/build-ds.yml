name: DS — Trigger Build & Deploy

# ─────────────────────────────────────────────────────────────────────────────
# Architecture:
#
# SERVER repo (this file) has TWO roles:
#
#  ROLE 1 — Dispatch trigger (push with "[ds_build]"):
#    Detects "[ds_build]" in commit message → sends repository_dispatch to
#    nighthunt_CLIENT repo which then builds Unity → Docker → GHCR.
#    Backend deploy runs in parallel via deploy.yml (all pushes to main).
#
#  ROLE 2 — Deploy receiver (repository_dispatch type "ds_build"):
#    Client repo finishes build, sends repository_dispatch with image_ref →
#    This job pulls the new image on VPS and notifies the backend API.
#
# Commit tag conventions (anywhere in the message):
#   [ds_build]   → trigger DS build + backend deploy simultaneously
#   (no tag)     → only backend deploy runs (deploy.yml)
#
# NOTE: GHCR_TOKEN must have "repo" scope to dispatch to nighthunt_client.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [ds_build]
  workflow_dispatch:
    inputs:
      mode:
        description: 'trigger-client: send dispatch to client repo | deploy-vps: pull image on VPS'
        required: false
        default: 'trigger-client'
        type: choice
        options: [trigger-client, deploy-vps]
      image_ref:
        description: 'DS image ref (for deploy-vps mode only)'
        required: false
        default: 'ghcr.io/nvanquyet/nighthunt-ds:latest'
      version:
        description: 'Image version label (for deploy-vps mode only)'
        required: false
        default: 'latest'

permissions:
  contents: write
  packages: read

env:
  DS_IMAGE_NAME: ${{ github.repository_owner }}/nighthunt-ds
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Job A: On push with [ds_build] → send dispatch to client repo ──────────
  trigger-ds:
    name: Trigger DS Build on Client
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push'
        && contains(github.event.head_commit.message, '[ds_build]'))
      || (github.event_name == 'workflow_dispatch'
        && inputs.mode == 'trigger-client')
    steps:
      - name: Log trigger
        run: |
          echo "Event     : ${{ github.event_name }}"
          echo "Commit    : ${{ github.event.head_commit.message }}"
          echo "SHA       : ${GITHUB_SHA:0:7}"
          echo "→ Dispatching ds_build to nighthunt_client..."

      - name: Dispatch DS build to client repo
        uses: peter-evans/repository-dispatch@v3
        with:
          # GHCR_TOKEN must have "repo" scope to dispatch to another repository.
          token:      ${{ secrets.GHCR_TOKEN }}
          repository: nvanquyet/nighthunt_client
          event-type: ds_build
          client-payload: |
            {
              "server_sha":    "${{ github.sha }}",
              "server_branch": "${{ github.ref_name }}",
              "triggered_by":  "${{ github.event.head_commit.message }}"
            }

      - name: Summary
        run: |
          {
            echo "## 🚀 DS Build Dispatched to Client"
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Commit | \`${GITHUB_SHA:0:7}\` |"
            echo "| Dispatched at | $(date -u +'%Y-%m-%d %H:%M UTC') |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Job B: On repository_dispatch from client → pull image → notify backend ─
  deploy-ds:
    name: Pull DS Image & Notify Backend
    runs-on: ubuntu-latest
    environment: production
    if: |
      github.event_name == 'repository_dispatch'
      || (github.event_name == 'workflow_dispatch'
        && inputs.mode == 'deploy-vps')

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image ref & version
        id: vars
        run: |
          IMAGE_REF="${{ github.event.client_payload.image_ref || inputs.image_ref || format('ghcr.io/{0}/nighthunt-ds:latest', github.repository_owner) }}"
          VERSION="${{ github.event.client_payload.version || inputs.version || 'latest' }}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"     >> "$GITHUB_OUTPUT"
          echo "DS image : ${IMAGE_REF}"
          echo "Version  : ${VERSION}"

      - name: SSH — Pull DS image & notify backend
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     22
          script: |
            set -e

            IMAGE_REF="${{ steps.vars.outputs.image_ref }}"
            VERSION="${{ steps.vars.outputs.version }}"
            ADMIN_SECRET=$(grep "^DS_ADMIN_SECRET=" /opt/nighthunt/.env.production | cut -d= -f2)

            echo "=== [1/4] Login to GHCR ==="
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            echo "=== [2/4] Pull new DS image: ${IMAGE_REF} ==="
            docker pull "${IMAGE_REF}"
            echo "Pull done ✓"

            echo "=== [3/4] Update DS_IMAGE_REF in .env.production ==="
            sed -i "s|^DS_IMAGE_REF=.*|DS_IMAGE_REF=${IMAGE_REF}|" \
              /opt/nighthunt/.env.production
            grep '^DS_IMAGE_REF=' /opt/nighthunt/.env.production

            echo "=== [4/4] Notify backend Admin API ==="
            RESP=$(curl -sf -X POST http://localhost:8080/api/admin/ds/update-image \
              -H "Content-Type: application/json" \
              -H "X-Admin-Secret: ${ADMIN_SECRET}" \
              -d "{\"imageRef\":\"${IMAGE_REF}\",\"version\":\"${VERSION}\"}" \
              || echo '{"success":false,"message":"curl failed"}')
            echo "Backend response: ${RESP}"
            echo "${RESP}" | grep -q '"success":true' \
              && echo "✅ Backend updated to ${IMAGE_REF}" \
              || { echo "⚠️  Unexpected backend response: ${RESP}"; exit 1; }

      - name: Push DS git tag
        run: |
          DATE=$(date +%Y%m%d)
          SHA="${GITHUB_SHA:0:7}"
          TAG="ds/${DATE}-${SHA}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git tag -d "${TAG}" 2>/dev/null || true
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true
          git tag -a "${TAG}" -m "DS deployed: ${{ steps.vars.outputs.image_ref }} (v${{ steps.vars.outputs.version }})"
          git push origin "${TAG}"
          echo "✅ DS tag pushed: ${TAG}"

      - name: Job Summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          {
            echo "## ${ICON} DS Deploy — ${STATUS^^}"
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| DS Image | \`${{ steps.vars.outputs.image_ref }}\` |"
            echo "| Version | \`${{ steps.vars.outputs.version }}\` |"
            echo "| Deployed at | ${DATE} |"
          } >> "$GITHUB_STEP_SUMMARY"
