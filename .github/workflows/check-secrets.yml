name: "Check Secrets & Config"
# ─────────────────────────────────────────────────────────────────────────────
# Chạy workflow này để kiểm tra xem các secrets đã được setup đúng chưa.
# Covers: Backend deploy + DS build + Smoke tests
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:

jobs:
  check-secrets:
    name: "Verify Repo-Level Secrets"
    runs-on: ubuntu-latest
    steps:
      - name: Check repo-level secrets
        env:
          HAS_GHCR_TOKEN:      ${{ secrets.GHCR_TOKEN != '' }}
          HAS_UNITY_LICENSE:   ${{ secrets.UNITY_LICENSE != '' }}
          HAS_UNITY_EMAIL:     ${{ secrets.UNITY_EMAIL != '' }}
          HAS_UNITY_PASSWORD:  ${{ secrets.UNITY_PASSWORD != '' }}
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║   NightHunt — Secrets & Config Checklist        ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""

          ALL_OK=true

          check() {
            local name=$1
            local present=$2
            local note=${3:-""}
            if [ "$present" = "true" ]; then
              echo "  ✅ $name"
            else
              echo "  ❌ $name  ← MISSING  $note"
              ALL_OK=false
            fi
          }

          warn() {
            local name=$1
            local present=$2
            local note=${3:-""}
            if [ "$present" = "true" ]; then
              echo "  ✅ $name"
            else
              echo "  ⚠️  $name  ← not set  $note"
            fi
          }

          echo "─── Repo-level Secrets (Settings → Secrets → Actions) ───"
          check "GHCR_TOKEN"     "$HAS_GHCR_TOKEN"     "(GitHub PAT scope: read:packages — docker pull DS image on VPS)"

          echo ""
          echo "─── Unity Build Secrets (for build-ds.yml / GameCI) ─────"
          echo "    One of the following groups is required:"
          echo "    Option A: UNITY_LICENSE (XML file content — Pro/Plus)"
          warn "UNITY_LICENSE"   "$HAS_UNITY_LICENSE"   "(content of .ulf license file)"
          echo "    Option B: UNITY_EMAIL + UNITY_PASSWORD (Personal)"
          warn "UNITY_EMAIL"     "$HAS_UNITY_EMAIL"     "(Unity account email)"
          warn "UNITY_PASSWORD"  "$HAS_UNITY_PASSWORD"  "(Unity account password)"

          HAS_UNITY_AUTH=false
          if [ "$HAS_UNITY_LICENSE" = "true" ] || \
             { [ "$HAS_UNITY_EMAIL" = "true" ] && [ "$HAS_UNITY_PASSWORD" = "true" ]; }; then
            HAS_UNITY_AUTH=true
          fi
          check "UNITY_AUTH_OK (any method)" "$HAS_UNITY_AUTH" "(need UNITY_LICENSE or UNITY_EMAIL+PASSWORD)"

          echo ""
          if [ "$ALL_OK" = "true" ]; then
            echo "  ✅ Repo-level secrets OK"
          else
            exit 1
          fi

  check-production-env:
    name: "Verify Production Environment Secrets"
    runs-on: ubuntu-latest
    environment: production   # Đọc secrets từ environment 'production'
    steps:
      - name: Check production secrets
        env:
          HAS_VPS_HOST:            ${{ secrets.VPS_HOST != '' }}
          HAS_VPS_USER:            ${{ secrets.VPS_USER != '' }}
          HAS_VPS_SSH_KEY:         ${{ secrets.VPS_SSH_KEY != '' }}
          HAS_DS_ADMIN_SECRET:     ${{ secrets.DS_ADMIN_SECRET != '' }}
          HAS_PRODUCTION_API_URL:  ${{ secrets.PRODUCTION_API_URL != '' }}
        run: |
          echo ""
          echo "─── Environment 'production' Secrets ────────────────────"
          echo "    (Settings → Environments → production → Secrets)"
          echo ""

          ALL_OK=true

          check() {
            local name=$1
            local present=$2
            local note=${3:-""}
            if [ "$present" = "true" ]; then
              echo "  ✅ $name"
            else
              echo "  ❌ $name  ← MISSING  $note"
              ALL_OK=false
            fi
          }

          # Core deploy
          check "VPS_HOST"           "$HAS_VPS_HOST"           "(IP của VPS)"
          check "VPS_USER"           "$HAS_VPS_USER"           "(thường là 'root')"
          check "VPS_SSH_KEY"        "$HAS_VPS_SSH_KEY"        "(ED25519 private key — do setup-vps.sh tạo)"

          echo ""
          echo "  --- Smoke tests & DS admin ---"
          check "DS_ADMIN_SECRET"    "$HAS_DS_ADMIN_SECRET"    "(khớp với DS_ADMIN_SECRET trong .env.production trên VPS)"
          check "PRODUCTION_API_URL" "$HAS_PRODUCTION_API_URL" "(vd: https://vawnwuyest.me/api — dùng bởi smoke-test.yml)"

          echo ""
          if [ "$ALL_OK" = "true" ]; then
            echo "  🎉 Tất cả production secrets đã đủ!"
          else
            echo ""
            echo "  ⚠️  Secrets còn thiếu. Thêm tại:"
            echo "    https://github.com/nvanquyet/nighthunt_server/settings/environments"
            echo "    → Chọn environment: production → Add secret"
            exit 1
          fi

# ─────────────────────────────────────────────────────────────────────────────
# HƯỚNG DẪN ĐẦY ĐỦ:
#
# A. Repo-level Secrets (Settings → Secrets → Actions):
#    ┌─────────────────┬──────────────────────────────────────────────────────┐
#    │ Secret name     │ Cách lấy                                             │
#    ├─────────────────┼──────────────────────────────────────────────────────┤
#    │ GHCR_TOKEN      │ GitHub PAT (classic) scope: read:packages            │
#    │ UNITY_LICENSE   │ Nội dung file .ulf (Unity Pro/Plus)                  │
#    │                 │ Xem: https://game.ci/docs/github/activation          │
#    │ UNITY_EMAIL     │ Email đăng nhập Unity (nếu dùng Personal license)    │
#    │ UNITY_PASSWORD  │ Password Unity (nếu dùng Personal license)           │
#    └─────────────────┴──────────────────────────────────────────────────────┘
#
# B. Environment 'production' (Settings → Environments → New: "production"):
#    ┌──────────────────────┬────────────────────────────────────────────────┐
#    │ Secret name          │ Giá trị                                        │
#    ├──────────────────────┼────────────────────────────────────────────────┤
#    │ VPS_HOST             │ IP VPS (vd: 20.2.235.140)                      │
#    │ VPS_USER             │ root                                           │
#    │ VPS_SSH_KEY          │ Private key từ /root/.ssh/nighthunt_deploy     │
#    │ DS_ADMIN_SECRET      │ Giống DS_ADMIN_SECRET trong .env.production    │
#    │ PRODUCTION_API_URL   │ https://vawnwuyest.me/api                      │
#    └──────────────────────┴────────────────────────────────────────────────┘
#
# C. DS Build Trigger (commit với tag):
#    git commit -m "[Build DS] update game logic"   → triggers build-ds.yml
#    git commit -m "fix: typo"                      → chỉ trigger deploy.yml
#
# D. Cross-repo trigger (từ Unity client repo):
#    curl -X POST https://api.github.com/repos/nvanquyet/nighthunt_server/dispatches \
#      -H "Authorization: Bearer <PAT_with_repo_scope>" \
#      -H "Content-Type: application/json" \
#      -d '{"event_type":"ds_build"}'
# ─────────────────────────────────────────────────────────────────────────────
