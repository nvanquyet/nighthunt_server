name: "Check Secrets & Config"
# ─────────────────────────────────────────────────────────────────────────────
# Chạy workflow này để kiểm tra xem các secrets đã được setup đúng chưa.
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:

jobs:
  check-secrets:
    name: "Verify All Secrets Present"
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets (non-deploy jobs)
        env:
          HAS_GHCR_TOKEN: ${{ secrets.GHCR_TOKEN != '' }}
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║   NightHunt Backend — Secrets Checklist     ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""

          ALL_OK=true

          check() {
            local name=$1
            local present=$2
            local note=${3:-""}
            if [ "$present" = "true" ]; then
              echo "  ✅ $name"
            else
              echo "  ❌ $name  ← MISSING  $note"
              ALL_OK=false
            fi
          }

          echo "--- Secrets (Settings → Secrets → Actions) ---"
          echo "    (VPS_HOST, VPS_USER, VPS_SSH_KEY nằm trong Environment 'production')"
          check "GHCR_TOKEN" "$HAS_GHCR_TOKEN" "(GitHub PAT scope: read:packages — dùng để docker pull trên VPS)"

          if [ "$ALL_OK" = "true" ]; then
            echo ""
            echo "  ✅ Repo-level secret OK"
          else
            echo ""
            exit 1
          fi

  check-production-env:
    name: "Verify Production Environment Secrets"
    runs-on: ubuntu-latest
    environment: production   # Đọc secrets từ environment 'production'
    steps:
      - name: Check production secrets
        env:
          HAS_VPS_HOST:    ${{ secrets.VPS_HOST != '' }}
          HAS_VPS_USER:    ${{ secrets.VPS_USER != '' }}
          HAS_VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY != '' }}
        run: |
          echo ""
          echo "--- Environment 'production' Secrets ---"
          echo "    (Settings → Environments → production → Secrets)"
          echo ""

          ALL_OK=true

          check() {
            local name=$1
            local present=$2
            local note=${3:-""}
            if [ "$present" = "true" ]; then
              echo "  ✅ $name"
            else
              echo "  ❌ $name  ← MISSING  $note"
              ALL_OK=false
            fi
          }

          check "VPS_HOST"    "$HAS_VPS_HOST"    "(IP của VPS, vd: 20.2.235.140)"
          check "VPS_USER"    "$HAS_VPS_USER"    "(thường là 'root')"
          check "VPS_SSH_KEY" "$HAS_VPS_SSH_KEY" "(private key ED25519, do setup-vps.sh tạo)"

          echo ""
          if [ "$ALL_OK" = "true" ]; then
            echo "  🎉 Tất cả secrets đã đủ! Có thể push lên main để trigger deploy."
          else
            echo "  ⚠️  Secrets còn thiếu."
            echo ""
            echo "  Cách thêm:"
            echo "    https://github.com/nvanquyet/nighthunt_server/settings/environments"
            echo "    → Chọn (hoặc tạo) environment tên: production"
            echo "    → Add secret"
            exit 1
          fi

# ─────────────────────────────────────────────────────────────────────────────
# HƯỚNG DẪN ĐẦY ĐỦ:
#
# A. Repo-level Secret (Settings → Secrets → Actions):
#    GHCR_TOKEN = GitHub PAT:
#       GitHub → Settings → Developer Settings → Personal access tokens (classic)
#       → New token → chọn scopes: read:packages
#       → Generate → copy giá trị → paste vào secret
#
# B. Environment 'production' (Settings → Environments → New: "production"):
#    VPS_HOST    = 20.2.235.140
#    VPS_USER    = root
#    VPS_SSH_KEY = nội dung private key từ /root/.ssh/nighthunt_deploy trên VPS
#                  (setup-vps.sh tự tạo key và in ra màn hình)
# ─────────────────────────────────────────────────────────────────────────────
