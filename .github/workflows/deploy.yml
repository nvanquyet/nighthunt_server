name: Build & Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/nighthunt-backend

jobs:
  # ── Job 1: Build & Test ──────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Build JAR (skip tests)
        run: ./gradlew build -x test --no-daemon

      - name: Run Tests
        run: ./gradlew test --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/NightHuntServer-*.jar
          retention-days: 3

  # ── Job 2: Docker Build & Push to GHCR ──────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to VPS ────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Copy configs to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "docker-compose.yml,docker/,dashboard/"
          target: /opt/nighthunt
          strip_components: 0

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            mkdir -p /opt/nighthunt
            cd /opt/nighthunt

            echo "=== Login GHCR ==="
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "=== Ensure game-network exists ==="
            docker network inspect nighthunt_game-network >/dev/null 2>&1 || docker network create nighthunt_game-network

            echo "=== Pull latest image ==="
            docker compose \
              --project-directory /opt/nighthunt \
              --env-file /opt/nighthunt/.env.production \
              pull backend

            echo "=== Restart backend ==="
            docker compose \
              --project-directory /opt/nighthunt \
              --env-file /opt/nighthunt/.env.production \
              up -d --no-deps --force-recreate backend

            echo "=== Health check (30s timeout) ==="
            for i in $(seq 1 6); do
              sleep 5
              STATUS=$(curl -s http://localhost:8080/api/actuator/health | grep -o '"status":"[A-Z]*"' | head -1 || true)
              if [ "$STATUS" = '"status":"UP"' ]; then
                echo "Backend UP"
                exit 0
              fi
              echo "Waiting... ($i/6)"
            done
            echo "Health check failed"
            docker compose --project-directory /opt/nighthunt --env-file /opt/nighthunt/.env.production logs backend --tail=50
            exit 1
