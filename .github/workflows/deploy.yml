name: Build & Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  PACKAGE_NAME: nighthunt-backend
  IMAGE_NAME: ${{ github.repository_owner }}/nighthunt-backend
  DEPLOY_DIR: /opt/nighthunt
  COMPOSE_PROJECT_NAME: nighthunt_server
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Build & Test ──────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Build JAR (skip tests)
        run: ./gradlew build -x test --no-daemon

      - name: Run Tests
        run: ./gradlew test --no-daemon

  # ── Job 2: Docker Build & Push to GHCR ──────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Login to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build and push
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Keep latest GHCR image and one backup
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
        run: |
          set -euo pipefail

          KEEP_TAGGED=2
          OWNER_TYPE=$(gh api "/users/${OWNER}" --jq '.type' 2>/dev/null || echo User)
          if [ "$OWNER_TYPE" = "Organization" ]; then
            API="/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions"
          else
            API="/users/${OWNER}/packages/container/${PACKAGE_NAME}/versions"
          fi

          VERSION_FILE=$(mktemp)
          gh api "$API" --paginate \
            --jq '.[] | [.id, .created_at, ((.metadata.container.tags // []) | join(","))] | @tsv' \
            > "$VERSION_FILE" || true

          if [ ! -s "$VERSION_FILE" ]; then
            echo "No GHCR package versions found for ${OWNER}/${PACKAGE_NAME}"
            exit 0
          fi

          TAGGED_FILE=$(mktemp)
          awk -F '\t' '$3 != "" { print }' "$VERSION_FILE" | sort -k2,2r > "$TAGGED_FILE"

          KEEP_IDS=$(awk -F '\t' -v keep="$KEEP_TAGGED" 'NR <= keep { print $1 }' "$TAGGED_FILE")
          awk -F '\t' -v keep_ids="$KEEP_IDS" '
            BEGIN {
              split(keep_ids, ids, "\n")
              for (i in ids) keep[ids[i]] = 1
            }
            !($1 in keep) { print $1 }
          ' "$TAGGED_FILE" | while read -r VERSION_ID; do
            [ -n "$VERSION_ID" ] || continue
            echo "Deleting old GHCR tagged version: ${VERSION_ID}"
            gh api --method DELETE "${API}/${VERSION_ID}" || echo "WARN: failed to delete GHCR package version ${VERSION_ID}"
          done

  # ── Job 3: Deploy to VPS ────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    environment: production
    permissions:
      contents: write         # Push git tag after successful deploy
      packages: read          # Pull the GHCR image from the VPS during deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy configs to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "docker-compose.yml,docker/,dashboard/,relay/,load-tests/"
          target: ${{ env.DEPLOY_DIR }}
          strip_components: 0

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.0
        env:
          GHCR_TOKEN: ${{ github.token }}
          GH_ACTOR: ${{ github.actor }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          COMPOSE_PROJECT_NAME: ${{ env.COMPOSE_PROJECT_NAME }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: GHCR_TOKEN,GH_ACTOR,DEPLOY_DIR,COMPOSE_PROJECT_NAME
          script: |
            set -e
            : "${DEPLOY_DIR:=/opt/nighthunt}"
            : "${COMPOSE_PROJECT_NAME:=nighthunt_server}"

            compose() {
              docker compose \
                -p "$COMPOSE_PROJECT_NAME" \
                --project-directory "$DEPLOY_DIR" \
                --env-file "$DEPLOY_DIR/.env.production" \
                "$@"
            }

            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            if [ ! -f "$DEPLOY_DIR/.env.production" ]; then
              echo "ERROR: Missing $DEPLOY_DIR/.env.production"
              exit 1
            fi

            if grep -Eq '^[A-Z0-9_]+=.*CHANGE_ME' "$DEPLOY_DIR/.env.production"; then
              echo "ERROR: $DEPLOY_DIR/.env.production still contains CHANGE_ME placeholders"
              exit 1
            fi

            echo "=== Login GHCR ==="
            if [ -z "${GHCR_TOKEN:-}" ]; then
              echo "ERROR: Missing GitHub token for GHCR login"
              exit 1
            fi
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            echo "=== Ensure game-network exists ==="
            docker network inspect nighthunt_game-network >/dev/null 2>&1 || docker network create nighthunt_game-network

            echo "=== Ensure database/cache are running in compose project: $COMPOSE_PROJECT_NAME ==="
            # compose rm -sf stops & removes any old containers for these services
            # (handles containers with stale/prefixed names from old deployments)
            compose rm -sf mysql redis 2>/dev/null || true
            compose up -d mysql redis

            echo "=== Prune stale builder cache (>24 h old only) ==="
            docker builder prune --filter until=24h -f 2>/dev/null || true

            echo "=== Build/start relay in compose project: $COMPOSE_PROJECT_NAME ==="
            compose rm -sf nighthunt-relay 2>/dev/null || true
            compose up -d --build nighthunt-relay

            compose rm -sf backend 2>/dev/null || true

            echo "=== Pull latest image ==="
            compose pull backend

            echo "=== Restart backend ==="
            compose up -d --no-deps --force-recreate backend

            echo "=== Clean stale DS records with wrong IP ==="
            VPS_IP=$(grep ^VPS_PUBLIC_IP "$DEPLOY_DIR/.env.production" | cut -d= -f2- | tr -d '\r' || true)
            DB_USER=$(grep ^DB_USERNAME "$DEPLOY_DIR/.env.production" | cut -d= -f2- | tr -d '\r' || true)
            DB_PASS=$(grep ^DB_PASSWORD "$DEPLOY_DIR/.env.production" | cut -d= -f2- | tr -d '\r' || true)
            DB_NAME=$(grep ^MYSQL_DATABASE "$DEPLOY_DIR/.env.production" | cut -d= -f2- | tr -d '\r' || true)
            MYSQL_PWD="$DB_PASS" docker exec -e MYSQL_PWD="$DB_PASS" nighthunt-mysql \
              mysql -u"$DB_USER" "$DB_NAME" -e \
              "UPDATE dedicated_server SET status='stopped', stopped_at=NOW() WHERE ip != '$VPS_IP' AND status IN ('ready','starting','in_game'); SELECT ROW_COUNT() AS stale_records_cleaned;" \
              2>/dev/null && echo "Stale DS records cleaned." || echo "WARN: DB cleanup failed (non-fatal)"

            echo "=== Health check (30s timeout) ==="
            BACKEND_PORT=$(grep ^SERVER_PORT "$DEPLOY_DIR/.env.production" | cut -d= -f2- | tr -d '\r' || true)
            BACKEND_PORT=${BACKEND_PORT:-8080}
            BACKEND_UP=false
            for i in $(seq 1 6); do
              sleep 5
              STATUS=$(curl -s "http://localhost:${BACKEND_PORT}/api/actuator/health" | grep -o '"status":"[A-Z]*"' | head -1 || true)
              if [ "$STATUS" = '"status":"UP"' ]; then
                echo "Backend UP"
                BACKEND_UP=true
                break
              fi
              echo "Waiting... ($i/6)"
            done

            if [ "$BACKEND_UP" != "true" ]; then
              echo "Health check failed"
              compose logs backend --tail=80
              exit 1
            fi

            echo "=== Build/start dashboard in compose project: $COMPOSE_PROJECT_NAME ==="
            compose rm -sf dashboard 2>/dev/null || true
            compose up -d --no-deps --build dashboard

            echo "=== Health check: dashboard (20s timeout) ==="
            DASH_UP=false
            for i in $(seq 1 4); do
              sleep 5
              if curl -sf "http://localhost:3000/health" >/dev/null 2>&1; then
                echo "Dashboard UP"
                DASH_UP=true
                break
              fi
              echo "Waiting for dashboard... ($i/4)"
            done
            if [ "$DASH_UP" != "true" ]; then
              echo "ERROR: Dashboard health check failed"
              compose logs dashboard --tail=40
              exit 1
            fi

            echo "=== Ensure nginx reverse proxy is in compose project: $COMPOSE_PROJECT_NAME ==="
            compose rm -sf nginx 2>/dev/null || true
            compose up -d --no-deps nginx

            echo "=== Verify nginx is up ==="
            sleep 3
            compose ps nginx | grep -q "Up" || { echo "ERROR: nginx container not running"; compose logs nginx --tail=30; exit 1; }

            echo "=== VPS Docker cleanup ==="
            # Stopped containers
            docker container prune -f 2>/dev/null || true
            # Keep only 2 most recent backend images (latest + 1 SHA backup)
            docker images "ghcr.io/nvanquyet/nighthunt-backend" --format "{{.CreatedAt}}\t{{.ID}}" \
              | sort -rk1 | awk 'NR>2{print $NF}' | sort -u \
              | xargs -r docker rmi -f 2>/dev/null && echo "Old backend images pruned" || true
            # Keep only 2 most recent DS images (latest + 1 SHA backup)
            docker images "ghcr.io/nvanquyet/nighthunt-ds" --format "{{.CreatedAt}}\t{{.ID}}" \
              | sort -rk1 | awk 'NR>2{print $NF}' | sort -u \
              | xargs -r docker rmi -f 2>/dev/null && echo "Old DS images pruned" || true
            # Remove dangling (untagged) image layers
            docker image prune -f 2>/dev/null || true
            # Remove builder cache older than 24 h (stale build layers from relay/dashboard)
            docker builder prune --filter until=24h -f 2>/dev/null || true
            # Remove volumes not attached to any container (preserves mysql_data, redis_data)
            docker volume prune -f 2>/dev/null || true
            echo "=== Disk usage after cleanup ==="
            docker system df

      - name: Push git tag
        run: |
          DATE=$(date +%Y%m%d)
          SHA="${GITHUB_SHA:0:7}"
          TAG="backend/${DATE}-${SHA}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -d "${TAG}" 2>/dev/null || true
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true
          git tag -a "${TAG}" -m "Backend deployed to production: ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.docker.outputs.image_tag }}"
          git push origin "${TAG}"
          echo "✅ Git tag pushed: ${TAG}"

  # ── Job 4: Smoke Test ───────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    environment: production

    steps:
      - name: Run smoke tests via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: DEPLOY_DIR
          script: |
            set -e
            : "${DEPLOY_DIR:=/opt/nighthunt}"
            # Use -f2- (not -f2) to capture the full value even if it contains '=' characters.
            ADMIN_SECRET=$(grep "^ADMIN_SECRET=" "$DEPLOY_DIR/.env.production" | cut -d= -f2- | tr -d '\r' || true)
            DS_IMAGE=$(grep "^DS_IMAGE_REF=" "$DEPLOY_DIR/.env.production" | cut -d= -f2- | tr -d '\r' || true)
            BACKEND_PORT=$(grep "^SERVER_PORT=" "$DEPLOY_DIR/.env.production" | cut -d= -f2- | tr -d '\r' || true)
            BACKEND_PORT=${BACKEND_PORT:-8080}
            [ -n "${ADMIN_SECRET}" ] || (echo "❌ ADMIN_SECRET not found in .env.production" && exit 1)
            [ -n "${DS_IMAGE}"     ] || (echo "❌ DS_IMAGE_REF not found in .env.production"  && exit 1)

            echo "=== [1/5] Backend health ==="
            STATUS=$(curl -sf "http://localhost:${BACKEND_PORT}/api/actuator/health" | grep -o '"status":"[A-Z]*"' | head -1)
            [ "$STATUS" = '"status":"UP"' ] || (echo "❌ Backend not healthy: $STATUS" && exit 1)
            echo "✅ Backend UP"

            echo "=== [2/5] DB & Redis health components ==="
            HEALTH=$(curl -sf "http://localhost:${BACKEND_PORT}/api/actuator/health")
            echo "${HEALTH}" | grep -o '"db":{[^}]*}' || true
            echo "${HEALTH}" | grep -o '"redis":{[^}]*}' || true
            echo "✅ Components checked"

            echo "=== [3/5] DS admin API ==="
            # Use -s (silent) without -f so we capture the body even on HTTP error codes.
            # Check HTTP status separately to emit a useful error message.
            HTTP_CODE=$(curl -s -o /tmp/admin_resp.json -w "%{http_code}" \
              "http://localhost:${BACKEND_PORT}/api/admin/ds/servers" \
              -H "X-Admin-Secret: ${ADMIN_SECRET}")
            RESP=$(cat /tmp/admin_resp.json)
            if [ "${HTTP_CODE}" != "200" ]; then
              echo "❌ Admin API returned HTTP ${HTTP_CODE}: ${RESP}"
              exit 1
            fi
            echo "${RESP}" | grep -q '"success":true' || (echo "❌ Admin API success=false: ${RESP}" && exit 1)
            echo "✅ Admin DS API OK (HTTP ${HTTP_CODE})"

            echo "=== [4/5] DS image on VPS ==="
            if docker image inspect "${DS_IMAGE}" --format "{{.Id}}" >/dev/null 2>&1; then
              echo "✅ DS image already local: ${DS_IMAGE}"
              # Verify binary inside image
              docker run --rm --entrypoint "" "${DS_IMAGE}" \
                sh -c "ls /app/NightHuntDS.x86_64 2>/dev/null || ls /app/NightHuntDS 2>/dev/null || (echo '❌ DS binary missing in image' && exit 1)" \
              && echo "✅ DS binary verified inside image"
            else
              echo "⚠️  DS image not yet on VPS (pull in progress): ${DS_IMAGE}"
            fi

            echo "=== [5/5] Dashboard health ==="
            DASH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:3000/health" || true)
            if [ "${DASH_STATUS}" = "200" ]; then
              echo "✅ Dashboard UP (HTTP 200)"
            else
              echo "❌ Dashboard health check failed (HTTP ${DASH_STATUS})"
              exit 1
            fi

            echo ""
            echo "✅ All smoke tests passed"

      - name: Job Summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          {
            echo "## ${ICON} Backend Deploy — ${STATUS^^}"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Commit | [\`${GITHUB_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${GITHUB_SHA}) |"
            echo "| Image | \`ghcr.io/${{ env.IMAGE_NAME }}:latest\` |"
            echo "| Deployed at | ${DATE} |"
            echo "| Environment | production |"
            echo ""
            if [ "$STATUS" = "success" ]; then
              echo "Backend deployed successfully ✅"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
